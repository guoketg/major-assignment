        - paragraph [ref=e359]:
          - strong [ref=e360]: 机器学习
          - text: （Machine Learning, ML）是人工智能（AI）的核心分支之一，它使计算机能够
          - strong [ref=e361]: 从数据中自动学习规律和模式
          - text: ，而无需显式编程。其核心思想是：通过算法从大量数据中提取特征、发现规律，并利用这些规律对新数据进行预测或决策。
        - heading "核心概念" [level=2] [ref=e362]
        - paragraph [ref=e363]: 机器学习系统通常包含三个要素：
        - list [ref=e364]:
          - listitem [ref=e365]:
            - strong [ref=e366]: 数据
            - text: ：训练模型的基础，包括特征（输入）和标签（输出，适用于监督学习）
          - listitem [ref=e367]:
            - strong [ref=e368]: 模型
            - text: ：一个数学函数或统计结构，用于映射输入到输出
          - listitem [ref=e369]:
            - strong [ref=e370]: 学习算法
            - text: ：通过优化目标函数（如损失函数最小化）来调整模型参数的机制
        - heading "主要类型" [level=2] [ref=e371]
