        - paragraph [ref=e2027]:
          - strong [ref=e2028]: ⚠️ 争议点
          - text: ：关于提示学习对噪声标签的鲁棒程度存在分歧。Wu et al. (2023)认为提示学习天然鲁棒，即使在高噪声率（40%）下也无需额外处理。但NLPrompt (Pan et al., 2024)指出，当噪声率超过50%时，提示学习的性能仍会显著下降（在CIFAR-100上下降约20%），需要专门设计噪声感知策略。这种分歧可能源于实验设置差异：Wu et al.使用的噪声类型为对称噪声，而NLPrompt测试了更接近真实场景的非对称噪声。
