        - paragraph [ref=e1953]:
          - strong [ref=e1954]: 核心结论
          - text: ：多篇论文一致验证，CLIP的预训练先验对噪声标签具有天然鲁棒性，且
          - strong [ref=e1955]: 提示学习（Prompt Tuning）比全模型微调（Full Fine-tuning）更鲁棒
          - text: 。原因在于提示学习只更新少量参数（通常<0.1%），保留了预训练特征空间的完整性。
