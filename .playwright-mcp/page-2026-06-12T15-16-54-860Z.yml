        - paragraph [ref=e2065]:
          - strong [ref=e2066]: 核心挑战
          - text: ：噪声对应比传统标签噪声更难处理，因为错误发生在
          - strong [ref=e2067]: 模态层面
          - text: ——图像和文本各自可能是正确的，但配对关系错误。传统的标签噪声处理方法（如小损失策略、标签修正）无法直接适用，因为噪声不是标签错误而是配对错误。
