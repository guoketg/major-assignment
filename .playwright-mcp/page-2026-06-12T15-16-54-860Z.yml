      - generic [ref=e1823]: 写一篇CLIP噪声标签综述
      - generic [ref=e1912]:
        - heading "CLIP模型噪声标签问题综述" [level=1] [ref=e1913]
        - heading "一、领域简介" [level=2] [ref=e1914]
        - paragraph [ref=e1915]:
          - text: CLIP（Contrastive Language-Image Pre-training）由OpenAI于2021年提出，通过在4亿图文对上训练对比学习目标，实现了强大的零样本迁移能力，成为多模态学习的基石模型。然而，CLIP面临的
          - strong [ref=e1916]: 噪声标签问题
          - text: 是制约其实际应用的关键瓶颈，主要体现在两个层面：
        - paragraph [ref=e1917]:
          - strong [ref=e1918]: 1. 训练阶段的噪声对应（Noisy Correspondence）
          - text: CLIP依赖从互联网爬取的图文数据（如LAION-5B、WIT、Conceptual Captions等），这些数据天然包含大量图文不匹配的噪声样本。例如，一张"猫"的图片可能配上了"狗"的文字描述，或者图文间仅有弱语义关联。这种噪声对应会直接损害CLIP学到的跨模态表征质量。
        - paragraph [ref=e1919]:
          - strong [ref=e1920]: 2. 下游适配阶段的标签噪声
          - text: 将CLIP适配到具体下游任务时，由于人工标注成本高昂，常使用自动标注、弱监督或众包标注方式，不可避免地引入类别标签噪声。例如，在医学影像分析、遥感图像识别等专业领域，非专家标注的准确率往往较低。
        - paragraph [ref=e1921]:
          - text: 近年来，针对CLIP噪声标签问题的研究迅速增长，形成了
          - strong [ref=e1922]: 鲁棒性分析、噪声检测与清洗、鲁棒微调方法、噪声对应处理
          - text: 四大方向。本文系统梳理该领域的研究进展，分析各方法的优缺点，并展望未来研究方向。
