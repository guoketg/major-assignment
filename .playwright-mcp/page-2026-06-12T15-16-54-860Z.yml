              - cell "结合域适应策略，增强CLIP在新域上的特征鲁棒性。" [ref=e1275]
            - row "Unlearning the Noisy Correspondence Makes CLIP More Robust (Han et al., 2025) 提出\"遗忘\"噪声对应样本的策略，识别并移除语义不相关的图文对。 从反事实学习角度处理噪声对应，而非直接筛选干净样本。" [ref=e1276]:
