              - cell "噪声类型多样时" [ref=e751]
            - row "架构改进 MaskCLIP, FILIP 增强模型抗噪能力 根本性提升鲁棒性 需要重新训练 追求极致性能时" [ref=e752]:
              - cell "架构改进" [ref=e753]
              - cell "MaskCLIP, FILIP" [ref=e754]
              - cell "增强模型抗噪能力" [ref=e755]
              - cell "根本性提升鲁棒性" [ref=e756]
              - cell "需要重新训练" [ref=e757]
              - cell "追求极致性能时" [ref=e758]
            - row "损失函数 SigLIP, SoftCLIP 设计噪声鲁棒的损失 优化目标明确 超参数敏感 噪声率已知时" [ref=e759]:
              - cell "损失函数" [ref=e760]
              - cell "SigLIP, SoftCLIP" [ref=e761]
              - cell "设计噪声鲁棒的损失" [ref=e762]
              - cell "优化目标明确" [ref=e763]
              - cell "超参数敏感" [ref=e764]
              - cell "噪声率已知时" [ref=e765]
        - separator [ref=e766]
        - heading "5. 实验证据与共识" [level=2] [ref=e767]
        - heading "✅ 已证实结论" [level=3] [ref=e768]
        - list [ref=e769]:
          - listitem [ref=e770]:
            - strong [ref=e771]: 数据质量比数据量更重要
            - text: ：多项研究（DFN, MetaCLIP）一致表明，使用30%-50%的高质量数据即可达到甚至超越全量数据的性能。
          - listitem [ref=e772]:
            - strong [ref=e773]: 多模态互补可有效缓解噪声
            - text: ：SLIP、DeCLIP等工作验证了引入图像自监督信号能显著提升对文本噪声的鲁棒性。
          - listitem [ref=e774]:
            - strong [ref=e775]: SigLIP损失在噪声场景下优于标准CLIP损失
            - text: ：多个独立实验证实，sigmoid对比损失对噪声标签更鲁棒。
        - heading "⚠️ 争议点" [level=3] [ref=e776]
        - list [ref=e777]:
          - listitem [ref=e778]:
            - strong [ref=e779]: 课程学习是否优于随机采样
            - text: ：部分研究认为课程学习有效，但也有工作指出在噪声率较低时，随机采样效果相当。
          - listitem [ref=e780]:
            - strong [ref=e781]: 硬过滤 vs 软加权
            - text: ：对于低质量数据，是直接移除还是降低权重，不同方法给出不同结论，取决于噪声分布特性。
        - heading "❓ 资料不足" [level=3] [ref=e782]
        - list [ref=e783]:
          - listitem [ref=e784]:
            - strong [ref=e785]: 噪声标签的长期影响
            - text: ：目前缺乏对模型在持续学习场景下噪声累积效应的研究。
          - listitem [ref=e786]:
            - strong [ref=e787]: 跨领域噪声迁移
            - text: ：在源领域训练的噪声鲁棒模型能否直接迁移到目标领域，尚缺乏系统研究。
          - listitem [ref=e788]:
            - strong [ref=e789]: 噪声类型与最优策略的映射关系
            - text: ：何种噪声类型最适合何种处理策略，缺乏统一的实验基准。
        - separator [ref=e790]
        - heading "6. 未来研究方向" [level=2] [ref=e791]
        - list [ref=e792]:
          - listitem [ref=e793]:
            - paragraph [ref=e794]:
              - strong [ref=e795]: 噪声标签的动态检测与校正
              - text: ：开发能在训练过程中实时检测并纠正噪声标签的方法，而非简单的过滤或加权。
          - listitem [ref=e796]:
            - paragraph [ref=e797]:
              - strong [ref=e798]: 领域自适应的噪声鲁棒训练
              - text: ：针对不同下游任务和数据分布，自动选择最优的噪声处理策略。
          - listitem [ref=e799]:
            - paragraph [ref=e800]:
              - strong [ref=e801]: 理论分析框架
              - text: ：建立CLIP噪声标签学习的信息论或统计学习理论框架，为方法设计提供理论指导。
          - listitem [ref=e802]:
            - paragraph [ref=e803]:
              - strong [ref=e804]: 大规模基准数据集
              - text: ：构建包含多种噪声类型和噪声率的标准化评测基准，促进该领域的公平比较。
          - listitem [ref=e805]:
            - paragraph [ref=e806]:
              - strong [ref=e807]: 噪声标签与公平性的交叉研究
              - text: ：研究噪声标签如何加剧模型偏见，并设计同时提升鲁棒性和公平性的方法。
        - separator [ref=e808]
        - heading "7. 结论" [level=2] [ref=e809]
        - paragraph [ref=e810]: CLIP噪声标签学习是视觉-语言预训练领域的重要研究课题。本文从数据清洗、鲁棒训练、架构改进和损失函数设计四个维度系统梳理了现有方法。当前研究已形成以下共识：数据质量至关重要、多模态互补有效、SigLIP损失更具鲁棒性。然而，在噪声动态检测、跨领域迁移和理论分析等方面仍存在大量开放问题。随着多模态大模型的快速发展，噪声标签学习将继续是推动模型性能提升的关键技术之一。
