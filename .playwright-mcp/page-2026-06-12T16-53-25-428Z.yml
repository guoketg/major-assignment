      - generic [ref=e294]:
        - paragraph [ref=e295]: 我来对CLIP噪声标签学习这一领域进行全面调研。让我先搜索相关论文。# CLIP噪声标签学习：现状、方法与展望
        - heading "1. 引言与领域背景" [level=2] [ref=e296]
        - paragraph [ref=e297]: CLIP（Contrastive Language-Image Pre-training）作为视觉-语言基础模型的代表，通过海量图文对数据进行对比学习，展现了强大的零样本泛化能力。然而，CLIP的训练数据（如LAION-5B等大规模网络爬取数据集）天然包含大量噪声——包括图文匹配错误、标签标注错误、语义歧义等。这种“噪声标签”问题成为制约CLIP在下游任务中表现的核心瓶颈之一。
        - paragraph [ref=e298]:
          - text: 与此同时，CLIP在迁移到新任务时通常需要少量标注数据进行微调，而实际应用中标注数据同样可能包含噪声。因此，
          - strong [ref=e299]: CLIP噪声标签学习
          - text: 旨在研究：(1) CLIP预训练阶段如何应对大规模数据中的固有噪声；(2) 微调阶段如何利用CLIP的特性（如多模态对齐、提示学习等）来抵抗标签噪声；(3) 如何设计鲁棒的训练策略以提升CLIP在噪声环境下的泛化性能。
        - heading "2. 核心方法分类与分析" [level=2] [ref=e300]
        - paragraph [ref=e301]: 根据现有文献[1-8]，CLIP噪声标签学习的研究方法可归纳为以下四大类：
        - heading "2.1 提示学习的固有鲁棒性" [level=3] [ref=e302]
        - paragraph [ref=e303]:
          - strong [ref=e304]: 代表工作：Wu et al. (2023) "Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?"
          - text: "[论文2]"
        - paragraph [ref=e305]: 该研究首次系统性地揭示了CLIP的提示学习（prompt tuning）对标签噪声具有天然鲁棒性。作者通过大量实验发现，即使训练集中存在较高比例的噪声标签（如40%），prompt tuning的性能下降幅度远小于传统全模型微调。其核心原因在于：
        - list [ref=e306]:
          - listitem [ref=e307]:
            - strong [ref=e308]: 参数效率
            - text: ：提示学习仅更新少量可学习参数（如文本端prompt tokens），大幅降低了模型对噪声标签的过拟合风险。
          - listitem [ref=e309]:
            - strong [ref=e310]: 多模态先验
            - text: ：CLIP预训练阶段已经学到了强大的图文对齐表示，提示学习只是“引导”这种对齐，而非重新学习特征，因此噪声标签的影响被限制在语义空间微调层面。
          - listitem [ref=e311]:
            - strong [ref=e312]: 隐式正则化
            - text: ：提示学习的低维优化空间本身具有正则化效应，抑制了噪声样本对决策边界的扭曲。
        - paragraph [ref=e313]:
          - strong [ref=e314]: 优点
          - text: ：实现简单、计算开销小、鲁棒性强，适合小样本噪声场景。
          - strong [ref=e315]: 缺点
          - text: ：在极高噪声比例（>60%）下性能仍会明显下降；对类别间语义相似性高的噪声（如“猫”和“虎”混淆）效果有限。
        - heading "2.2 样本选择与清洗策略" [level=3] [ref=e316]
        - paragraph [ref=e317]:
          - strong [ref=e318]: "代表工作：Deng et al. (2024) \"CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels\""
          - text: "[论文1]"
        - paragraph [ref=e319]: CRoF针对小样本学习场景下的噪声标签问题，提出了一种结合CLIP多模态特征的样本选择框架。其核心思路是：
        - list [ref=e320]:
          - listitem [ref=e321]:
            - strong [ref=e322]: 多模态一致性评估
            - text: ：利用CLIP的图文相似度作为样本“清洁度”的指标。对于每个样本，计算其图像与对应文本标签的匹配分数，分数低的样本被视为潜在噪声。
          - listitem [ref=e323]:
            - strong [ref=e324]: 动态阈值调整
            - text: ：不同于固定阈值，CRoF根据每个类别的分布特性自适应调整筛选阈值，避免“一刀切”导致清洁样本被误删。
          - listitem [ref=e325]:
            - strong [ref=e326]: 软标签重分配
            - text: ：对识别出的噪声样本，利用CLIP的零样本分类能力生成软标签，替代原始硬标签参与训练。
        - paragraph [ref=e327]:
          - strong [ref=e328]: 类似思路
          - text: ：Liang et al. (2023) "Combating Label Noise With A General Surrogate Model For Sample Selection" [论文4] 虽然不专门针对CLIP，但其提出的通用代理模型+样本选择框架与CLIP结合具有良好潜力。
        - paragraph [ref=e329]:
          - strong [ref=e330]: 优点
          - text: ：能有效过滤高置信度噪声，保留清洁样本质量。
          - strong [ref=e331]: 缺点
          - text: ：依赖CLIP本身的图文对齐质量——如果噪声样本恰好与错误标签在语义上“意外对齐”，则难以检测；小样本场景下统计量不稳定。
        - heading "2.3 无标注/自训练范式" [level=3] [ref=e332]
        - paragraph [ref=e333]:
          - strong [ref=e334]: 代表工作：Wang et al. (2026) "Fine-tuning Pre-trained Vision-Language Models in a Human-Annotation-Free Manner"
          - text: "[论文7]"
        - paragraph [ref=e335]: 该工作探索了完全无需人工标注的CLIP微调方法，从根本上规避了噪声标签问题。其方法包括：
        - list [ref=e336]:
          - listitem [ref=e337]:
            - strong [ref=e338]: 自生成伪标签
            - text: ：利用CLIP的零样本能力为下游任务数据生成初始伪标签。
          - listitem [ref=e339]: "**置信度过滤"
        - text: "|"
