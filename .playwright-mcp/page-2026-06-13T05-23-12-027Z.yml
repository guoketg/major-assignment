          - listitem [ref=e584]:
            - strong [ref=e585]: 二次复杂度问题
            - text: ：标准自注意力的计算复杂度为 ( O(n^2) )，处理长序列时显存和计算开销巨大
          - listitem [ref=e586]:
            - strong [ref=e587]: 位置编码局限
            - text: ：绝对位置编码难以泛化到更长序列，相对位置编码（如 RoPE、ALiBi）部分缓解
          - listitem [ref=e588]:
            - strong [ref=e589]: 数据需求大
            - text: ：大 Transformer 需要海量数据和算力，训练成本极高
          - listitem [ref=e590]:
            - strong [ref=e591]: 可解释性不足
            - text: ：虽然注意力权重可看，但深层网络的决策过程仍不透明
          - listitem [ref=e592]:
            - strong [ref=e593]: 灾难性遗忘
            - text: ：在微调时容易遗忘预训练知识
        - separator [ref=e594]
        - heading "九、未来方向" [level=2] [ref=e595]
        - list [ref=e596]:
          - listitem [ref=e597]:
            - strong [ref=e598]: 线性复杂度注意力
            - text: ：如 Mamba（状态空间模型）、RWKV、Linear Attention
          - listitem [ref=e599]:
            - strong [ref=e600]: 混合架构
            - text: ：Transformer + CNN / RNN / SSM 的结合
          - listitem [ref=e601]:
            - strong [ref=e602]: 超长上下文
            - text: ：百万级 token 上下文窗口（如 GPT-4-128K、Gemini 1.5 Pro、Claude 3）
          - listitem [ref=e603]:
            - strong [ref=e604]: 稀疏化与 MoE
            - text: ：混合专家模型（Mixture of Experts）降低推理成本
          - listitem [ref=e605]:
            - strong [ref=e606]: 更高效的训练
            - text: ：FlashAttention 系列、量化、蒸馏
          - listitem [ref=e607]:
            - strong [ref=e608]: 多模态融合
            - text: ：统一的视觉-语言-语音模型
        - separator [ref=e609]
        - heading "十、总结" [level=2] [ref=e610]
        - paragraph [ref=e611]:
          - text: Transformer 模型的核心贡献在于
          - strong [ref=e612]: 证明了纯注意力机制足以替代循环和卷积结构
          - text: ，并在序列建模上取得了突破性进展。它的
          - strong [ref=e613]: 并行化能力、全局建模能力和可扩展性
          - text: 使其成为深度学习领域最具影响力的架构之一。
        - paragraph [ref=e614]:
          - text: 从最初的机器翻译任务出发，Transformer 已经渗透到 NLP、CV、语音、多模态、科学计算等几乎所有 AI 子领域，并催生了
          - strong [ref=e615]: BERT、GPT、ViT、CLIP、AlphaFold 2
          - text: 等一系列里程碑式的工作。尽管存在计算复杂度高、数据需求大等挑战，但持续涌现的优化方案正在推动 Transformer 走向更高效、更通用的未来。
        - paragraph [ref=e616]:
          - text: 可以说，Transformer 不仅是一个模型架构，更代表了一种
          - strong [ref=e617]: "\"注意力即一切\""
          - text: 的范式转变，深刻重塑了人工智能的发展方向。
