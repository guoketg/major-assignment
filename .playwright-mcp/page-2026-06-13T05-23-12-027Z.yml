                - strong [ref=e477]: 完全并行化
              - cell "自注意力可并行计算所有位置的注意力，训练速度远超 RNN" [ref=e478]
            - row "全局感受野 每个位置直接关注所有位置，天然解决长程依赖" [ref=e479]:
              - cell "全局感受野" [ref=e480]:
                - strong [ref=e481]: 全局感受野
              - cell "每个位置直接关注所有位置，天然解决长程依赖" [ref=e482]
            - row "多头机制 在不同子空间学习多种关系模式" [ref=e483]:
