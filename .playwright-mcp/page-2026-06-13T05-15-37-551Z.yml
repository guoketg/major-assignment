        - heading "核心特性" [level=3] [ref=e353]
        - heading "1. 局部连接（Local Connectivity）" [level=4] [ref=e354]:
          - text: "1."
          - strong [ref=e355]: 局部连接（Local Connectivity）
        - paragraph [ref=e356]:
