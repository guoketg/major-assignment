      - generic [ref=e171]:
        - heading "机器学习简介" [level=1] [ref=e172]
        - paragraph [ref=e173]:
          - strong [ref=e174]: 机器学习
          - text: （Machine Learning, ML）是人工智能（AI）的核心分支之一，它使计算机能够
          - strong [ref=e175]: 从数据中自动学习规律和模式
          - text: ，而无需显式编程。其核心思想是：通过算法从大量数据中提取特征、发现规律，并利用这些规律对新数据进行预测或决策。
        - heading "核心概念" [level=2] [ref=e176]
        - paragraph [ref=e177]: 机器学习系统通常包含三个要素：
        - list [ref=e178]:
          - listitem [ref=e179]:
            - strong [ref=e180]: 数据
            - text: ：训练模型的基础，包括特征（输入）和标签（输出，适用于监督学习）
          - listitem [ref=e181]:
            - strong [ref=e182]: 模型
            - text: ：一个数学函数或统计结构，用于映射输入到输出
          - listitem [ref=e183]:
            - strong [ref=e184]: 学习算法
            - text: ：通过优化目标函数（如损失函数最小化）来调整模型参数的机制
        - heading "主要类型" [level=2] [ref=e185]
        - table [ref=e186]:
          - rowgroup [ref=e187]:
            - row "类型 特点 典型算法" [ref=e188]:
              - columnheader "类型" [ref=e189]
              - columnheader "特点" [ref=e190]
              - columnheader "典型算法" [ref=e191]
          - rowgroup [ref=e192]:
            - row "监督学习 使用带标签数据训练，预测输出 线性回归、SVM、随机森林、神经网络" [ref=e193]:
              - cell "监督学习" [ref=e194]:
                - strong [ref=e195]: 监督学习
              - cell "使用带标签数据训练，预测输出" [ref=e196]
              - cell "线性回归、SVM、随机森林、神经网络" [ref=e197]
            - row "无监督学习 使用无标签数据，发现隐藏结构 K-Means聚类、PCA、自编码器" [ref=e198]:
              - cell "无监督学习" [ref=e199]:
                - strong [ref=e200]: 无监督学习
              - cell "使用无标签数据，发现隐藏结构" [ref=e201]
              - cell "K-Means聚类、PCA、自编码器" [ref=e202]
            - row "半监督学习 少量标签+大量无标签数据 自训练、图神经网络" [ref=e203]:
              - cell "半监督学习" [ref=e204]:
                - strong [ref=e205]: 半监督学习
              - cell "少量标签+大量无标签数据" [ref=e206]
              - cell "自训练、图神经网络" [ref=e207]
            - row "强化学习 通过与环境交互获得奖励信号来学习 Q-Learning、DQN、PPO" [ref=e208]:
              - cell "强化学习" [ref=e209]:
                - strong [ref=e210]: 强化学习
              - cell "通过与环境交互获得奖励信号来学习" [ref=e211]
              - cell "Q-Learning、DQN、PPO" [ref=e212]
        - heading "关键流程" [level=2] [ref=e213]
        - list [ref=e214]:
          - listitem [ref=e215]:
            - strong [ref=e216]: 数据收集与预处理
            - text: （清洗、归一化、增强）
          - listitem [ref=e217]:
            - strong [ref=e218]: 特征工程
            - text: （提取、选择、降维）
          - listitem [ref=e219]:
            - strong [ref=e220]: 模型选择与训练
            - text: （划分训练/验证/测试集）
          - listitem [ref=e221]:
            - strong [ref=e222]: 评估与调优
            - text: （交叉验证、超参数搜索、正则化防止过拟合）
          - listitem [ref=e223]:
            - strong [ref=e224]: 部署与监控
            - text: （模型上线、持续学习）
        - heading "现代发展" [level=2] [ref=e225]
        - paragraph [ref=e226]:
          - text: 近年来，
          - strong [ref=e227]: 深度学习
          - text: （多层神经网络）在计算机视觉、自然语言处理、语音识别等领域取得突破性进展。大语言模型（如GPT系列）和扩散模型（如Stable Diffusion）更将机器学习推向通用人工智能的前沿。
        - paragraph [ref=e228]: 机器学习已广泛应用于推荐系统、自动驾驶、医疗诊断、金融风控等场景，深刻改变着现代社会的运作方式。
