      - generic [ref=e140]:
        - heading "Transformer 模型简介" [level=1] [ref=e141]
        - paragraph [ref=e142]:
          - strong [ref=e143]: Transformer
          - text: 是 Google 在 2017 年论文
          - emphasis [ref=e144]: "\"Attention Is All You Need\""
          - text: 中提出的深度学习架构，彻底改变了自然语言处理和计算机视觉等领域。
        - paragraph [ref=e145]:
          - text: 其核心创新是
          - strong [ref=e146]: 自注意力机制（Self-Attention）
          - text: ，通过计算序列中每个位置与其他位置的关联权重，捕捉长距离依赖关系。结构上由
          - strong [ref=e147]: 编码器（Encoder）
          - text: 和
          - strong [ref=e148]: 解码器（Decoder）
          - text: 堆叠而成，每层包含多头注意力（Multi-Head Attention）和前馈神经网络（FFN），并引入残差连接与层归一化。
        - paragraph [ref=e149]:
          - text: 相比 RNN/LSTM，Transformer 支持
          - strong [ref=e150]: 并行计算
          - text: ，训练速度大幅提升。基于此架构发展出了 BERT、GPT、ViT 等里程碑模型，成为现代 AI 的基石。
      - generic [ref=e153]: 500字介绍深度学习的最新进展 要包括Transformer Mamba 扩散模型
