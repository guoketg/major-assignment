    - generic [ref=e18]:
      - generic [ref=e232]: 写一篇CLIP噪声标签学习短综述
      - generic [ref=e234] [cursor=pointer]:
        - generic [ref=e235]: 🤖 Agent 流水线
        - generic [ref=e236]: 展开 ▼
      - generic [ref=e357]:
        - heading "引言" [level=2] [ref=e358]
        - paragraph [ref=e359]: CLIP（Contrastive Language-Image Pre-training）作为视觉-语言基础模型的代表，通过海量图文对数据进行对比学习，展现了强大的零样本泛化能力。然而，其训练数据（如LAION-5B）天然包含大量噪声，包括图文匹配错误、标签标注错误等。此外，微调阶段的标注数据也可能存在噪声。因此，CLIP噪声标签学习旨在研究如何应对预训练和微调过程中的标签噪声，以提升模型的鲁棒性和泛化性能。
        - heading "核心方法分类" [level=2] [ref=e360]
        - paragraph [ref=e361]: 现有研究主要归纳为四大类方法：
        - heading "提示学习的固有鲁棒性" [level=3] [ref=e362]
        - paragraph [ref=e363]:
          - strong [ref=e364]: 代表工作
          - text: ：Wu et al. (2023) “Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?”
        - paragraph [ref=e365]: 该研究首次系统性地揭示了CLIP的提示学习对标签噪声具有天然鲁棒性。核心原因包括：参数效率高（仅更新少量可学习参数）、多模态先验强（预训练已学到良好对齐）、隐式正则化（低维优化空间抑制过拟合）。该方法实现简单、计算开销小，但在极高噪声（>60%）或语义相似噪声下性能下降明显。
        - heading "样本选择与清洗策略" [level=3] [ref=e366]
        - paragraph [ref=e367]:
          - strong [ref=e368]: 代表工作
          - text: "：Deng et al. (2024) “CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels”"
        - paragraph [ref=e369]: CRoF利用CLIP的图文相似度评估样本清洁度，通过动态阈值自适应筛选噪声样本，并对识别出的噪声样本使用软标签重分配。类似思路如Liang et al. (2023) 提出的通用代理模型+样本选择框架。该方法能有效过滤高置信度噪声，但依赖CLIP自身的对齐质量，且小样本场景下统计量不稳定。
        - heading "无标注/自训练范式" [level=3] [ref=e370]
        - paragraph [ref=e371]:
          - strong [ref=e372]: 代表工作
          - text: ：Wang et al. (2026) “Fine-tuning Pre-trained Vision-Language Models in a Human-Annotation-Free Manner”
        - paragraph [ref=e373]: 该方法完全无需人工标注，利用CLIP零样本能力生成伪标签，通过置信度过滤和迭代优化提升伪标签质量，并引入一致性正则化增强鲁棒性。优点在于彻底摆脱人工标注，但伪标签质量高度依赖CLIP的零样本泛化能力，目标域差异大时可能崩溃。
        - heading "对抗训练与安全性增强" [level=3] [ref=e374]
        - paragraph [ref=e375]:
          - strong [ref=e376]: 代表工作
          - text: ：Carlini & Terzis (2021) “Poisoning and Backdooring Contrastive Learning”
        - paragraph [ref=e377]: 该研究揭示了CLIP训练数据可被恶意投毒和后门攻击，促使引入对抗训练和异常检测。后续工作如Xing et al. (2026) 探索了微调中保持对抗鲁棒性。该方法兼顾安全与鲁棒，但计算成本高，后门检测在开放域中效果有限。
        - heading "未来方向" [level=2] [ref=e378]
        - list [ref=e379]:
          - listitem [ref=e380]:
            - strong [ref=e381]: 噪声类型的细粒度建模
            - text: ：当前多假设随机噪声，实际场景中噪声常具结构性（类别依赖、长尾），需发展针对性处理方法。
          - listitem [ref=e382]:
            - strong [ref=e383]: 多模态协同去噪
            - text: ：利用跨模态信息（如图像特征辅助文本噪声检测）进行协同去噪。
          - listitem [ref=e384]:
            - strong [ref=e385]: 动态噪声适应
            - text: ：开发在线适应噪声分布的微调算法，以应对数据流场景中噪声比例和类型的变化。
          - listitem [ref=e386]:
            - strong [ref=e387]: 理论分析深化
            - text: ：从优化景观、泛化界等角度建立严格数学框架，解释CLIP在噪声标签下的行为。
          - listitem [ref=e388]:
            - strong [ref=e389]: 大规模噪声数据集基准构建
            - text: ：建立包含多种噪声类型、不同比例、跨领域迁移的标准化评估基准。
