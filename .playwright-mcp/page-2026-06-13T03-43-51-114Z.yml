      - generic [ref=e317]:
        - paragraph [ref=e446]: 好的，作为科研综述写作专家，我将综合各位专家的分析，去除重复内容，组织成一篇结构清晰、内容详实的综述报告。
        - separator [ref=e447]
        - heading "CLIP 模型噪声标签问题研究综述" [level=2] [ref=e448]
        - heading "1. 引言" [level=3] [ref=e449]
        - paragraph [ref=e450]:
          - text: CLIP（Contrastive Language-Image Pre-Training）作为大规模视觉-语言基础模型，通过在海量（图像，文本）对上执行对比学习，习得了一个通用的图像-文本联合嵌入空间，展现出强大的零样本泛化与迁移能力。然而，CLIP 在实际应用中面临一个核心挑战——
          - strong [ref=e451]: 噪声标签（Noisy Labels）
          - text: 。这一问题在两个层面尤为突出：
        - list [ref=e452]:
          - listitem [ref=e453]:
            - strong [ref=e454]: 预训练阶段
            - text: ：CLIP 训练依赖从互联网爬取的图文对数据（如 WIT、LAION-400M 等），这些数据天然包含大量噪声。文本描述可能与图像内容不相关、不完整或包含误导性信息。Carlini & Terzis (2021) 在
            - emphasis [ref=e455]: “Poisoning and Backdooring Contrastive Learning”
            - text: 中指出，这种未经严格清洗的训练方式使得 CLIP 对后门攻击和投毒攻击特别脆弱，仅污染 0.01% 的训练数据即可显著影响模型行为。
          - listitem [ref=e456]:
            - strong [ref=e457]: 下游微调阶段
            - text: ：当 CLIP 被适配到特定下游任务时，高质量人工标注成本高昂，常依赖自动标注、弱监督或伪标签方法，这进一步引入了标签噪声。Wang et al. (2024) 在
            - emphasis [ref=e458]: “Pre-Trained Vision-Language Models as Partial Annotators”
            - text: 中系统研究了将 CLIP 作为部分标注器的可行性，发现直接使用其预测作为标签会产生不可忽视的噪声。
        - paragraph [ref=e459]: 因此，研究 CLIP 对噪声标签的鲁棒性机制，并开发有效的噪声应对方法，对于推动 CLIP 从实验室走向实际应用具有至关重要的理论价值和实践意义。
        - heading "2. 核心发现：提示学习对噪声标签的内禀鲁棒性" [level=3] [ref=e460]
        - paragraph [ref=e461]:
          - strong [ref=e462]: Wu et al. (2023)
          - text: 在论文
          - emphasis [ref=e463]: “Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?”
          - text: （arXiv:2307.11978）中做出了一个开创性发现：
          - strong [ref=e464]: CLIP 的提示学习（Prompt Tuning）对标签噪声具有高度内禀鲁棒性
          - text: 。该论文通过系统实验揭示：
        - list [ref=e465]:
          - listitem [ref=e466]:
            - strong [ref=e467]: 惊人表现
            - text: ：在 CIFAR-10/100、ImageNet 等基准数据集上，当标签噪声率高达 40%–80% 时，CoOp（Context Optimization）等提示学习方法仍能保持接近无噪声情况下的分类性能。
          - listitem [ref=e468]:
            - strong [ref=e469]: 对比实验
            - text: ：全微调（Full Fine-tuning）方法在相同噪声率下性能急剧下降，而提示学习几乎不受影响。例如在 60% 对称噪声下，全微调准确率从 85% 跌至 40%，而提示学习仅从 85% 跌至 78%。
        - paragraph [ref=e470]:
          - strong [ref=e471]: 鲁棒性来源的理论分析
          - text: ：
        - list [ref=e472]:
          - listitem [ref=e473]:
            - strong [ref=e474]: 预训练先验的保持
            - text: ：提示学习仅调整少量文本侧的连续 prompt embeddings（通常为 16 个 token，约 1.2 万参数），几乎不改变 CLIP 预训练的视觉-语言对齐空间。因此，预训练阶段从海量数据中学到的丰富知识得以完整保留，不会被噪声样本的误导信号覆盖。
          - listitem [ref=e475]:
            - strong [ref=e476]: 梯度特性差异
            - text: ：噪声样本产生的梯度方向与干净样本不一致，但由于可训练参数极少（仅为全微调的 0.01%），噪声梯度对整体优化的扰动被限制在极小的参数子空间内。此外，噪声样本的梯度范数通常更大，但在 prompt 学习的低维参数空间中难以对模型产生实质性影响。
          - listitem [ref=e477]:
            - strong [ref=e478]: 隐式正则化
            - text: ：提示学习本质上是一种隐式正则化——固定预训练权重相当于施加了极强的参数约束，防止模型在噪声数据上过拟合。
        - paragraph [ref=e479]:
          - text: 这一发现具有重要的实践意义：
          - strong [ref=e480]: 在大多数实际场景中，直接使用 CLIP 的提示学习即可获得对噪声标签的天然免疫力，无需额外设计复杂的噪声处理模块。
        - heading "3. 核心方法分类与详细分析" [level=3] [ref=e481]
        - paragraph [ref=e482]: 尽管提示学习具有天然鲁棒性，但在高噪声率、域偏移、小样本等复杂场景下，仍需专门的噪声处理策略。当前主流方法可分为以下几类：
        - heading "3.1 基于样本选择与标签清洗的方法" [level=4] [ref=e483]
        - list [ref=e484]:
          - listitem [ref=e485]:
            - paragraph [ref=e486]:
              - strong [ref=e487]: CLIPCleaner (Feng et al., 2024)
              - text: —
              - emphasis [ref=e488]: "“CLIPCleaner: Cleaning Noisy Labels with CLIP”"
              - text: （arXiv:2408.10012）
            - list [ref=e489]:
              - listitem [ref=e490]:
                - strong [ref=e491]: 核心思路
                - text: ：利用 CLIP 的零样本能力作为“教师模型”，对噪声数据集进行标签清洗，而非依赖下游训练过程中的模型自身预测。
              - listitem [ref=e492]:
                - strong [ref=e493]: 方法
                - text: ：计算 CLIP 的图文匹配分数作为置信度指标，设置双阈值策略：高置信度样本（分数 > τ_high）直接保留原始标签；低置信度样本（分数 < τ_low）使用 CLIP 的零样本预测结果替换原始标签；中等置信度样本进行加权处理。
              - listitem [ref=e494]:
                - strong [ref=e495]: 创新点
                - text: ：避免了传统“小损失”（small-loss）策略的“自我确认偏差”（self-confirmation bias），利用的是预训练知识而非正在训练的模型的预测，从根本上规避了这一风险。
              - listitem [ref=e496]:
                - strong [ref=e497]: 效果
                - text: ：在 CIFAR-10N、CIFAR-100N、Red Mini-ImageNet 等噪声数据集上，显著优于传统 LNL 方法，特别是在高噪声率（>60%）场景下优势明显。
          - listitem [ref=e498]:
            - paragraph [ref=e499]:
              - strong [ref=e500]: CRoF (Deng et al., 2024)
              - text: —
              - emphasis [ref=e501]: "“CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels”"
              - text: （arXiv:2412.12793）
            - list [ref=e502]:
              - listitem [ref=e503]:
                - strong [ref=e504]: 核心思路
                - text: ：针对小样本场景（每类仅 1-16 个样本）下的噪声标签问题，提出 CLIP 特征增强与噪声鲁棒训练结合的方法。
              - listitem [ref=e505]:
                - strong [ref=e506]: 方法
                - text: ：利用 CLIP 的视觉编码器提取鲁棒特征表示，设计特征级的一致性正则化（Feature-level Consistency Regularization），迫使模型在干净和噪声样本上产生相似的特征分布。同时，结合样本重加权策略，根据 CLIP 的零样本预测与给定标签的一致性动态调整每个样本的损失权重。
              - listitem [ref=e507]:
                - strong [ref=e508]: 创新点
                - text: ：传统 FSL 方法在小样本+噪声标签场景下几乎崩溃（因为样本太少无法区分噪声），CRoF 通过引入 CLIP 的强先验知识有效缓解了这一问题。
        - heading "3.2 基于提示学习优化的方法" [level=4] [ref=e509]
        - list [ref=e510]:
          - listitem [ref=e511]:
            - paragraph [ref=e512]:
              - strong [ref=e513]: NLPrompt (Pan et al., 2024)
              - text: —
              - emphasis [ref=e514]: "“NLPrompt: Noise-Label Prompt Learning for Vision-Language Models”"
              - text: （arXiv:2412.01256）
            - list [ref=e515]:
              - listitem [ref=e516]:
                - strong [ref=e517]: 核心思路
                - text: ：直接针对噪声标签场景优化提示学习过程，而非先清洗再训练的两阶段方法。
              - listitem [ref=e518]:
                - strong [ref=e519]: 方法
                - text: ：包含一个噪声标签检测模块，利用 CLIP 的零样本预测与给定标签的交叉熵作为噪声检测指标。同时，设计了一种噪声鲁棒的对比损失（Adaptive Contrastive Loss），对可疑样本的梯度进行自适应裁剪——当样本的零样本预测与标签不一致时，降低其对比损失中的权重。
              - listitem [ref=e520]:
                - strong [ref=e521]: 创新点
                - text: ：将噪声标签处理与提示学习端到端结合，无需额外的训练阶段或外部模型。
              - listitem [ref=e522]:
                - strong [ref=e523]: 效果
                - text: ：在多个噪声数据集上，NLPrompt 不仅优于标准提示学习，还优于先清洗后训练的两阶段方法，特别是在噪声率超过 50% 的场景下。
          - listitem [ref=e524]:
            - paragraph [ref=e525]:
              - strong [ref=e526]: Intrinsic Gradient Suppression (Li et al., 2026)
              - text: —
              - emphasis [ref=e527]: “Intrinsic Gradient Suppression for Label-Noise Prompt Tuning in Vision-Language Models”
              - text: （arXiv:2605.00591）
            - list [ref=e528]:
              - listitem [ref=e529]:
                - strong [ref=e530]: 核心思路
                - text: ：从梯度分析的角度解决噪声标签问题，基于一个关键观察——噪声样本在提示学习中会产生异常大的梯度。
              - listitem [ref=e531]:
                - strong [ref=e532]: 方法
                - text: ：提出“内在梯度抑制”（IGS）机制，对每个样本的梯度进行实时监控，当梯度范数超过动态阈值时，对该样本的梯度进行自适应缩放。同时，设计了一种基于梯度分布的噪声检测器，利用 CLIP 预训练特征空间中干净样本和噪声样本梯度分布的差异性（干净样本梯度更集中、更小）。
              - listitem [ref=e533]:
                - strong [ref=e534]: 关键发现
                - text: ：通过理论分析证明，CLIP 预训练提供的良好特征空间使得干净样本和噪声样本的梯度分布具有可分离性——这是 IGS 方法有效性的理论基础。
              - listitem [ref=e535]:
                - strong [ref=e536]: 效果
                - text: ：在 CIFAR-10/100 的对称噪声、非对称噪声和细粒度噪声场景下，IGS 均显著优于 NLPrompt 和其他基线方法。
        - heading "3.3 基于半监督与伪标签的方法" [level=4] [ref=e537]
        - list [ref=e538]:
          - listitem [ref=e539]:
            - strong [ref=e540]: Wang et al. (2026)
            - text: —
            - emphasis [ref=e541]: “Fine-tuning Pre-trained Vision-Language Models in a Human-Annotation-Free Manner”
            - text: （arXiv:2602.04337）
            - list [ref=e542]:
              - listitem [ref=e543]:
                - strong [ref=e544]: 核心思路
                - text: ：提出一种完全无人工标注的 CLIP 微调方案。
              - listitem [ref=e545]:
                - strong [ref=e546]: 方法
                - text: ：使用 CLIP 零样本预测作为初始伪标签，并设计“可靠置信度过滤”机制。该机制不仅考虑预测置信度，还考虑预测稳定性（多次随机扰动后的预测一致性），以缓解传统伪标签方法中“高置信度不等于正确”的问题。
              - listitem [ref=e547]:
                - strong [ref=e548]: 创新点
                - text: ：通过引入预测稳定性指标，有效提升了伪标签的质量，使得模型能够在无人工标注的场景下进行有效的微调。
