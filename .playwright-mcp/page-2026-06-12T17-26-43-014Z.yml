    - generic [ref=e18]:
      - generic [ref=e262]: 写一篇CLIP发展的短综述
      - generic [ref=e269]:
        - paragraph [ref=e270]: 好的，作为一名科研综述写作专家，我将综合以上三位专家的分析结果，为您呈现一份关于CLIP（Contrastive Language-Image Pre-training）发展的综合综述报告。
        - separator [ref=e279]
        - heading "CLIP 发展综述：从对比学习到多模态基础模型" [level=2] [ref=e280]
        - heading "引言" [level=3] [ref=e281]
        - paragraph [ref=e271]:
          - text: 视觉-语言多模态预训练是人工智能领域的核心前沿之一，其目标是让模型同时理解图像和文本，并建立两者之间的语义关联。2021年，OpenAI 提出的
          - strong [ref=e282]: CLIP（Contrastive Language-Image Pre-training）
          - text: 模型成为了该领域的里程碑式工作。CLIP 的核心思想是通过对比学习，在 4 亿个图文对数据上训练一个图像编码器（如 ViT 或 ResNet）和一个文本编码器（Transformer），将图像和文本映射到共享的语义空间。其最大的突破在于实现了强大的零样本迁移能力：无需任何微调，即可直接迁移到 ImageNet 等下游视觉分类任务，准确率达到 76.2%，并支持通过自然语言 prompt 定义任意任务。
        - paragraph [ref=e277]: 自 CLIP 提出以来，围绕其训练效率、下游适配、鲁棒性、细粒度理解等方向涌现了大量研究工作。本综述旨在系统梳理 CLIP 的核心方法分类、发展脉络，分析各方法的优缺点，并展望未来研究方向。
        - heading "核心方法分类与发展脉络" [level=3] [ref=e283]
        - paragraph [ref=e278]: CLIP 的发展可概括为从原始对比学习范式出发，向更高效、更鲁棒、更细粒度以及更广泛领域应用的演进过程。
        - heading "1. 原始 CLIP 架构与训练范式" [level=4] [ref=e284]
        - paragraph [ref=e285]:
          - strong [ref=e286]: 核心方法
          - text: ：原始 CLIP 模型（Radford et al., 2021）采用双塔架构，通过对比损失（InfoNCE loss）进行训练。其目标是最大化 batch 内匹配图文对的相似度，同时最小化不匹配图文对的相似度。这一范式奠定了后续所有工作基础。
        - paragraph [ref=e287]:
          - strong [ref=e288]: 关键贡献
          - text: ：
        - list [ref=e272]:
          - listitem [ref=e273]:
            - strong [ref=e289]: 零样本分类
            - text: ：在 ImageNet 上达到 76.2% 的零样本准确率。
          - listitem [ref=e274]:
            - strong [ref=e290]: 自然语言引导
            - text: ：用户可通过文本 prompt 定义任务，无需重新训练。
          - listitem [ref=e275]:
            - strong [ref=e291]: 跨模态检索
            - text: ：实现文本到图像、图像到文本的高效检索。
        - heading "2. 训练效率与数据增强改进" [level=4] [ref=e292]
        - paragraph [ref=e293]: 原始 CLIP 的训练依赖于 4 亿个图文对，成本高昂。后续工作致力于在不增加数据量的情况下提升模型质量。
        - list [ref=e294]:
          - listitem [ref=e295]:
            - paragraph [ref=e296]:
              - strong [ref=e297]: LaCLIP (Language Rewrites CLIP)
              - text: （Fan et al., 2023）：核心创新在于利用大语言模型（LLM）对训练文本进行多样化改写，生成同一图像对应的不同语言描述。这在不增加数据量的前提下，有效提升了图像-文本的对齐质量。其局限性在于依赖外部 LLM，增加了训练成本。
          - listitem [ref=e298]:
            - paragraph [ref=e299]:
              - strong [ref=e300]: Long-CLIP
              - text: （Zhang et al., 2024）：核心创新是扩展 CLIP 文本编码器对长文本（如详细段落）的处理能力。这增强了模型对物体属性、空间关系等细粒度语义的理解，并提升了文本-图像检索的精度。然而，长文本训练需要额外数据，且模型推理速度会略有下降。
        - heading "3. 下游任务适配与微调方法" [level=4] [ref=e301]
        - paragraph [ref=e302]: 为了将强大的 CLIP 模型适配到特定下游任务，研究者提出了多种参数高效的微调方法，以避免灾难性遗忘并保持零样本能力。
        - list [ref=e303]:
          - listitem [ref=e304]:
            - paragraph [ref=e305]:
              - strong [ref=e306]: Prompt Learning 方法
              - text: ：
            - list [ref=e307]:
              - listitem [ref=e308]:
                - strong [ref=e309]: CoOp (Context Optimization)
                - text: （Zhou et al., 2022）：将手工设计的 prompt（如“a photo of a [class]”）替换为可学习的连续向量。该方法无需人工设计 prompt，能自动优化到下游任务，但在域外数据上泛化性不足。
              - listitem [ref=e310]:
                - strong [ref=e311]: CoCoOp (Conditional CoOp)
                - text: （Zhou et al., 2022）：针对 CoOp 的不足，CoCoOp 根据输入图像动态生成 prompt。这显著提升了模型在域外数据上的泛化能力，但计算开销更大。
          - listitem [ref=e312]:
            - paragraph [ref=e313]:
              - strong [ref=e314]: Adapter 方法
              - text: ：
            - list [ref=e315]:
              - listitem [ref=e316]:
                - strong [ref=e317]: CLIP-Adapter
                - text: （Gao et al., 2021）：在 CLIP 冻结的特征空间中插入轻量级适配器层，仅需训练 0.1% 的参数即可完成下游适配。该方法参数高效，能有效避免灾难性遗忘，但适配能力有限，在复杂任务上效果不足。
          - listitem [ref=e318]:
            - paragraph [ref=e319]:
              - strong [ref=e320]: 全微调与鲁棒性平衡
              - text: ：
            - list [ref=e321]:
              - listitem [ref=e322]:
                - strong [ref=e323]: CLIPood
                - text: （Shu et al., 2023）：结合对比学习和分布校准技术，专门针对分布偏移场景提升模型鲁棒性。该方法在域外数据上保持高准确率，但训练过程复杂度增加。
              - listitem [ref=e324]:
                - strong [ref=e325]: Efficient Robust Fine-Tuning
                - text: （Kim et al., 2024）：提出一种新的微调策略，旨在平衡域内准确率和域外泛化能力，在保持 CLIP 零样本能力的同时有效适应下游任务。然而，在极端分布偏移下性能仍会下降。
        - heading "4. 持续学习与自监督优化" [level=4] [ref=e326]
        - list [ref=e327]:
          - listitem [ref=e328]:
            - strong [ref=e329]: Self-supervised Fine-tuning
            - text: （Mehta et al., 2025）：提出一个自监督微调框架，无需任何标注数据即可提升 CLIP 性能。该方法降低了对标注数据的依赖，适用于开放权重模型，但性能提升幅度有限，且需要大量计算资源。
        - heading "5. 半监督与领域特定应用" [level=4] [ref=e330]
        - list [ref=e331]:
          - listitem [ref=e332]:
            - strong [ref=e333]: MaskedCLIP
            - text: （Zhu et al., 2025）：针对医学领域标注数据稀缺的问题，将掩码自编码与 CLIP 结合，实现半监督医学图像预训练。该方法在医学图像分析任务上表现优异，但迁移到自然图像任务时效果下降。
        - heading "各方法优缺点分析" [level=3] [ref=e334]
        - table [ref=e335]:
          - rowgroup [ref=e336]:
            - row "方法类别 代表工作 核心优点 核心缺点" [ref=e337]:
