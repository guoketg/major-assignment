              - cell "需要重新训练" [ref=e1010]
              - cell "追求极致性能时" [ref=e1011]
            - row "损失函数 SigLIP, SoftCLIP 设计噪声鲁棒的损失 优化目标明确 超参数敏感 噪声率已知时" [ref=e1012]:
              - cell "损失函数" [ref=e1013]
              - cell "SigLIP, SoftCLIP" [ref=e1014]
              - cell "设计噪声鲁棒的损失" [ref=e1015]
              - cell "优化目标明确" [ref=e1016]
              - cell "超参数敏感" [ref=e1017]
              - cell "噪声率已知时" [ref=e1018]
        - separator [ref=e1019]
        - heading "5. 实验证据与共识" [level=2] [ref=e1020]
        - heading "✅ 已证实结论" [level=3] [ref=e1021]
        - list [ref=e1022]:
          - listitem [ref=e1023]:
            - strong [ref=e1024]: 数据质量比数据量更重要
            - text: ：多项研究（DFN, MetaCLIP）一致表明，使用30%-50%的高质量数据即可达到甚至超越全量数据的性能。
          - listitem [ref=e1025]:
            - strong [ref=e1026]: 多模态互补可有效缓解噪声
            - text: ：SLIP、DeCLIP等工作验证了引入图像自监督信号能显著提升对文本噪声的鲁棒性。
          - listitem [ref=e1027]:
            - strong [ref=e1028]: SigLIP损失在噪声场景下优于标准CLIP损失
            - text: ：多个独立实验证实，sigmoid对比损失对噪声标签更鲁棒。
        - heading "⚠️ 争议点" [level=3] [ref=e1029]
        - list [ref=e1030]:
          - listitem [ref=e1031]:
            - strong [ref=e1032]: 课程学习是否优于随机采样
            - text: ：部分研究认为课程学习有效，但也有工作指出在噪声率较低时，随机采样效果相当。
          - listitem [ref=e1033]:
            - strong [ref=e1034]: 硬过滤 vs 软加权
            - text: ：对于低质量数据，是直接移除还是降低权重，不同方法给出不同结论，取决于噪声分布特性。
        - heading "❓ 资料不足" [level=3] [ref=e1035]
        - list [ref=e1036]:
          - listitem [ref=e1037]:
            - strong [ref=e1038]: 噪声标签的长期影响
            - text: ：目前缺乏对模型在持续学习场景下噪声累积效应的研究。
          - listitem [ref=e1039]:
            - strong [ref=e1040]: 跨领域噪声迁移
            - text: ：在源领域训练的噪声鲁棒模型能否直接迁移到目标领域，尚缺乏系统研究。
          - listitem [ref=e1041]:
            - strong [ref=e1042]: 噪声类型与最优策略的映射关系
            - text: ：何种噪声类型最适合何种处理策略，缺乏统一的实验基准。
        - separator [ref=e1043]
        - heading "6. 未来研究方向" [level=2] [ref=e1044]
        - list [ref=e1045]:
          - listitem [ref=e1046]:
            - paragraph [ref=e1047]:
              - strong [ref=e1048]: 噪声标签的动态检测与校正
              - text: ：开发能在训练过程中实时检测并纠正噪声标签的方法，而非简单的过滤或加权。
          - listitem [ref=e1049]:
            - paragraph [ref=e1050]:
              - strong [ref=e1051]: 领域自适应的噪声鲁棒训练
              - text: ：针对不同下游任务和数据分布，自动选择最优的噪声处理策略。
          - listitem [ref=e1052]:
            - paragraph [ref=e1053]:
              - strong [ref=e1054]: 理论分析框架
              - text: ：建立CLIP噪声标签学习的信息论或统计学习理论框架，为方法设计提供理论指导。
          - listitem [ref=e1055]:
            - paragraph [ref=e1056]:
              - strong [ref=e1057]: 大规模基准数据集
              - text: ：构建包含多种噪声类型和噪声率的标准化评测基准，促进该领域的公平比较。
          - listitem [ref=e1058]:
            - paragraph [ref=e1059]:
              - strong [ref=e1060]: 噪声标签与公平性的交叉研究
              - text: ：研究噪声标签如何加剧模型偏见，并设计同时提升鲁棒性和公平性的方法。
        - separator [ref=e1061]
        - heading "7. 结论" [level=2] [ref=e1062]
        - paragraph [ref=e1063]: CLIP噪声标签学习是视觉-语言预训练领域的重要研究课题。本文从数据清洗、鲁棒训练、架构改进和损失函数设计四个维度系统梳理了现有方法。当前研究已形成以下共识：数据质量至关重要、多模态互补有效、SigLIP损失更具鲁棒性。然而，在噪声动态检测、跨领域迁移和理论分析等方面仍存在大量开放问题。随着多模态大模型的快速发展，噪声标签学习将继续是推动模型性能提升的关键技术之一。
