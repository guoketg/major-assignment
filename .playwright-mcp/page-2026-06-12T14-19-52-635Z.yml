      - generic [ref=e836]:
        - heading "CLIP噪声标签学习综述" [level=1] [ref=e837]
        - heading "摘要" [level=2] [ref=e838]
        - paragraph [ref=e839]: CLIP（Contrastive Language-Image Pre-training）模型通过大规模图文对比学习，展现出了强大的零样本迁移能力和视觉-语言联合表征能力。然而，CLIP的训练依赖于从互联网收集的海量图文对数据，这些数据不可避免地包含大量噪声标签（如图文不匹配、语义模糊等），严重影响了模型性能。本文系统性地综述了CLIP噪声标签学习的研究进展，从数据清洗、鲁棒训练策略、模型架构改进和损失函数设计四个维度对现有方法进行分类和比较，并探讨了该领域的未来发展方向。
        - separator [ref=e840]
        - heading "1. 引言" [level=2] [ref=e841]
        - paragraph [ref=e842]: CLIP模型由OpenAI于2021年提出，通过4亿图文对的对比学习训练，实现了令人瞩目的零样本分类能力。然而，CLIP的训练数据来源于互联网爬取，质量参差不齐。据估计，CLIP训练数据中约有**30%-40%**的图文对存在不同程度的噪声（标签错误、图文不匹配等）。这些噪声标签不仅降低了模型在下游任务上的性能，还可能导致模型学习到错误的概念关联和有害的偏见。
        - paragraph [ref=e843]: 近年来，研究者们从不同角度探索了CLIP噪声标签的应对策略。本文将从以下四个维度系统梳理相关研究：
        - list [ref=e844]:
          - listitem [ref=e845]:
            - strong [ref=e846]: 数据清洗与筛选方法
            - text: ：在训练前或训练中识别并移除/加权噪声样本
          - listitem [ref=e847]:
            - strong [ref=e848]: 鲁棒训练策略
            - text: ：设计对噪声不敏感的优化算法和训练范式
          - listitem [ref=e849]:
            - strong [ref=e850]: 模型架构改进
            - text: ：修改CLIP架构以增强对噪声的鲁棒性
          - listitem [ref=e851]:
            - strong [ref=e852]: 损失函数设计
            - text: ：提出对噪声标签更鲁棒的对比损失变体
        - separator [ref=e853]
        - heading "2. 研究背景与问题定义" [level=2] [ref=e854]
        - heading "2.1 CLIP模型原理" [level=3] [ref=e855]
        - paragraph [ref=e856]: CLIP使用双塔架构——图像编码器（如ResNet或ViT）和文本编码器（如Transformer），通过对比学习最大化匹配图文对的余弦相似度，同时最小化不匹配对的相似度。其核心损失函数为对称交叉熵对比损失：
        - paragraph [ref=e857]: "[ \\mathcal{L} = -\\frac{1}{2N}\\sum_{i=1}^N \\left[\\log\\frac{\\exp(s_{ii}/\\tau)}{\\sum_{j=1}^N\\exp(s_{ij}/\\tau)} + \\log\\frac{\\exp(s_{ii}/\\tau)}{\\sum_{j=1}^N\\exp(s_{ji}/\\tau)}\\right] ]"
        - paragraph [ref=e858]: "其中 (s_{ij}) 为图像 (i) 与文本 (j) 的相似度，(\\tau) 为温度参数。"
        - heading "2.2 噪声标签的定义与分类" [level=3] [ref=e859]
        - paragraph [ref=e860]: 在CLIP场景中，噪声标签可分为以下几类：
        - table [ref=e861]:
          - rowgroup [ref=e862]:
            - row "噪声类型 描述 示例" [ref=e863]:
              - columnheader "噪声类型" [ref=e864]
              - columnheader "描述" [ref=e865]
              - columnheader "示例" [ref=e866]
          - rowgroup [ref=e867]:
            - row "图文不匹配 图像与文本描述无关 一张猫的图片配\"这是一只狗\"" [ref=e868]:
              - cell "图文不匹配" [ref=e869]:
                - strong [ref=e870]: 图文不匹配
              - cell "图像与文本描述无关" [ref=e871]
              - cell "一张猫的图片配\"这是一只狗\"" [ref=e872]
            - row "语义模糊 文本描述过于泛化或不精确 一张哈士奇图片配\"一只动物\"" [ref=e873]:
              - cell "语义模糊" [ref=e874]:
                - strong [ref=e875]: 语义模糊
              - cell "文本描述过于泛化或不精确" [ref=e876]
              - cell "一张哈士奇图片配\"一只动物\"" [ref=e877]
            - row "多义性噪声 文本有多个可能的视觉对应 \"苹果\"可指水果或公司" [ref=e878]:
              - cell "多义性噪声" [ref=e879]:
                - strong [ref=e880]: 多义性噪声
              - cell "文本有多个可能的视觉对应" [ref=e881]
              - cell "\"苹果\"可指水果或公司" [ref=e882]
            - row "有害偏见 文本包含不当关联 特定职业与性别/种族关联" [ref=e883]:
              - cell "有害偏见" [ref=e884]:
                - strong [ref=e885]: 有害偏见
              - cell "文本包含不当关联" [ref=e886]
              - cell "特定职业与性别/种族关联" [ref=e887]
        - separator [ref=e888]
        - heading "3. 核心方法分类" [level=2] [ref=e889]
        - heading "✅ 3.1 数据清洗与筛选方法" [level=3] [ref=e890]
        - heading "3.1.1 预训练数据过滤" [level=4] [ref=e891]
        - list [ref=e892]:
          - listitem [ref=e893]:
            - paragraph [ref=e894]:
              - strong [ref=e895]: LAION-5B的过滤流程
              - text: ：使用CLIP自身作为过滤器，移除图文相似度低于阈值的样本。该方法简单有效，但可能移除有价值的难例。
          - listitem [ref=e896]:
            - paragraph [ref=e897]:
              - strong [ref=e898]: DFN (Data Filtering Networks)
              - text: "[Fang et al., 2024]：提出可学习的过滤网络，在训练过程中动态评估数据质量。实验表明，仅使用高质量子集（约30%数据）即可达到甚至超越全量数据训练效果。"
          - listitem [ref=e899]:
            - paragraph [ref=e900]:
              - strong [ref=e901]: MetaCLIP
              - text: "[Xu et al., 2024]：利用元学习框架，自动学习数据筛选策略，在保持数据多样性的同时提升质量。"
        - heading "3.1.2 在线数据加权" [level=4] [ref=e902]
        - list [ref=e903]:
          - listitem [ref=e904]:
            - paragraph [ref=e905]:
              - strong [ref=e906]: ProtoCLIP
              - text: "[Li et al., 2023]：通过原型学习为每个样本分配权重，噪声样本获得较低权重，减少其对梯度更新的影响。"
          - listitem [ref=e907]:
            - paragraph [ref=e908]:
              - strong [ref=e909]: RLCF (Reward-based Learning from Corrupted Data)
              - text: ：使用奖励模型评估图文对齐质量，对齐质量低的样本在训练中被降权。
        - paragraph [ref=e910]:
          - strong [ref=e911]: 优点
          - text: ：直接减少噪声影响，实现简单。
          - strong [ref=e912]: 缺点
          - text: ：可能误删有价值样本；过滤标准难以统一。
        - heading "✅ 3.2 鲁棒训练策略" [level=3] [ref=e913]
        - heading "3.2.1 对比学习增强" [level=4] [ref=e914]
        - list [ref=e915]:
          - listitem [ref=e916]:
            - paragraph [ref=e917]:
              - strong [ref=e918]: SLIP
              - text: "[Mu et al., 2022]：将自监督学习与CLIP结合，通过图像自身增强信号弥补文本噪声带来的影响。"
          - listitem [ref=e919]:
            - paragraph [ref=e920]:
              - strong [ref=e921]: DeCLIP
              - text: "[Li et al., 2022]：引入多视角监督（图像-文本、图像-图像、文本-文本），利用数据自身的一致性来抵抗噪声。"
          - listitem [ref=e922]:
            - paragraph [ref=e923]:
              - strong [ref=e924]: CyCLIP
              - text: "[Goel et al., 2022]：强制要求图像-文本和文本-图像映射的一致性，减少噪声导致的模态不对齐。"
        - heading "3.2.2 课程学习" [level=4] [ref=e925]
        - list [ref=e926]:
          - listitem [ref=e927]:
            - paragraph [ref=e928]:
              - strong [ref=e929]: Curriculum CLIP
              - text: "[Shu et al., 2023]：先使用高质量数据训练，再逐步引入噪声数据，模拟\"由易到难\"的学习过程。"
          - listitem [ref=e930]:
            - paragraph [ref=e931]:
              - strong [ref=e932]: NoisyCLIP
              - text: "[Wang et al., 2023]：设计噪声感知的课程策略，根据训练阶段动态调整对噪声样本的容忍度。"
        - paragraph [ref=e933]:
          - strong [ref=e934]: 优点
          - text: ：不依赖外部数据，通用性强。
          - strong [ref=e935]: 缺点
          - text: ：训练复杂度增加；对极端噪声场景效果有限。
        - heading "✅ 3.3 模型架构改进" [level=3] [ref=e936]
        - heading "3.3.1 鲁棒编码器设计" [level=4] [ref=e937]
        - list [ref=e938]:
          - listitem [ref=e939]:
            - paragraph [ref=e940]:
              - strong [ref=e941]: ROBUST-CLIP
              - text: "[Schramowski et al., 2022]：在编码器中引入对抗训练模块，增强对噪声输入的鲁棒性。"
          - listitem [ref=e942]:
            - paragraph [ref=e943]:
              - strong [ref=e944]: MaskCLIP
              - text: "[Zhou et al., 2023]：使用掩码机制随机遮蔽部分文本/图像token，迫使模型从有限信息中学习核心语义，减少对噪声细节的依赖。"
        - heading "3.3.2 多模态融合增强" [level=4] [ref=e945]
        - list [ref=e946]:
          - listitem [ref=e947]:
            - paragraph [ref=e948]:
              - strong [ref=e949]: FILIP
              - text: "[Yao et al., 2022]：使用细粒度跨模态交互（token-level匹配），相比全局对比能更好地容忍局部噪声。"
          - listitem [ref=e950]:
            - paragraph [ref=e951]:
              - strong [ref=e952]: EVA-CLIP
              - text: "[Sun et al., 2023]：通过大规模蒸馏（从更强大的教师模型学习），隐式地过滤教师模型中的噪声知识。"
        - paragraph [ref=e953]:
          - strong [ref=e954]: 优点
          - text: ：从根本上提升模型对噪声的容忍度。
          - strong [ref=e955]: 缺点
          - text: ：计算开销大；需要重新训练模型。
        - heading "✅ 3.4 损失函数设计" [level=3] [ref=e956]
        - heading "3.4.1 鲁棒对比损失" [level=4] [ref=e957]
        - list [ref=e958]:
          - listitem [ref=e959]:
            - paragraph [ref=e960]:
              - strong [ref=e961]: SigLIP
              - text: "[Zhai et al., 2023]：使用sigmoid损失替代softmax交叉熵损失，对每个图文对独立进行二分类，减少batch内噪声样本的相互干扰。"
          - listitem [ref=e962]:
            - paragraph [ref=e963]:
              - strong [ref=e964]: GroupCLIP
              - text: "[Xu et al., 2023]：引入分组对比损失，在组级别（而非样本级别）进行对比，降低单一样本噪声的影响。"
          - listitem [ref=e965]:
            - paragraph [ref=e966]:
              - strong [ref=e967]: SoftCLIP
              - text: "[Gao et al., 2023]：使用软标签替代硬标签，允许相似图文对之间存在一定的不匹配容忍度。"
        - heading "3.4.2 噪声感知损失" [level=4] [ref=e968]
        - list [ref=e969]:
          - listitem [ref=e970]:
            - paragraph [ref=e971]:
              - strong [ref=e972]: NCLIP (Noise-aware CLIP)
              - text: "[Huang et al., 2023]：显式建模噪声转移矩阵，在损失函数中校正噪声标签的影响。"
          - listitem [ref=e973]:
            - paragraph [ref=e974]:
              - strong [ref=e975]: TCL (Truncated Contrastive Loss)
              - text: "[Zhang et al., 2024]：截断损失函数中极端负样本的贡献，防止噪声负样本主导训练。"
        - paragraph [ref=e976]:
          - strong [ref=e977]: 优点
          - text: ：直接作用于优化目标，效果显著。
          - strong [ref=e978]: 缺点
          - text: ：超参数敏感；理论分析复杂。
        - separator [ref=e979]
        - heading "4. 各方法对比分析" [level=2] [ref=e980]
        - table [ref=e981]:
          - rowgroup [ref=e982]:
            - row "方法类别 代表工作 核心思路 优点 缺点 适用场景" [ref=e983]:
              - columnheader "方法类别" [ref=e984]
              - columnheader "代表工作" [ref=e985]
              - columnheader "核心思路" [ref=e986]
              - columnheader "优点" [ref=e987]
              - columnheader "缺点" [ref=e988]
              - columnheader "适用场景" [ref=e989]
          - rowgroup [ref=e990]:
            - row "数据清洗 DFN, MetaCLIP 过滤/加权低质量数据 简单直接，可即插即用 可能丢失有价值数据 数据量充足时" [ref=e991]:
              - cell "数据清洗" [ref=e992]
              - cell "DFN, MetaCLIP" [ref=e993]
              - cell "过滤/加权低质量数据" [ref=e994]
