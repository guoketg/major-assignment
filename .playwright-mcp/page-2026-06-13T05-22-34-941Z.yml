              - cell "全局感受野" [ref=e228]:
                - strong [ref=e229]: 全局感受野
              - cell "每个位置直接关注所有位置，天然解决长程依赖" [ref=e230]
            - row "多头机制 在不同子空间学习多种关系模式" [ref=e231]:
