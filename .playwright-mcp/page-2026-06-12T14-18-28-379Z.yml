      - generic [ref=e323]:
        - heading "CLIP模型噪声标签学习综述" [level=1] [ref=e324]
        - heading "一、引言与研究背景" [level=2] [ref=e325]
        - heading "1.1 问题背景" [level=3] [ref=e326]
        - paragraph [ref=e327]:
          - text: CLIP（Contrastive Language-Image Pre-training）作为大规模视觉语言模型，通过4亿图文对的对比学习训练，展现出强大的零样本迁移能力和跨模态表征能力。然而，在实际应用中，CLIP面临一个严峻挑战——
          - strong [ref=e328]: 噪声标签问题
          - text: 。真实世界的数据标注往往包含大量错误标签（如网络爬取数据、众包标注等），这些噪声标签会严重损害模型的微调性能和泛化能力。
        - paragraph [ref=e329]: 传统噪声标签学习方法（如样本选择、损失修正等）主要针对单模态CNN模型设计，难以直接迁移到CLIP这类多模态架构上。近年来，研究者开始系统探索CLIP在噪声标签场景下的鲁棒性机制和应对策略，形成了多个重要的研究方向。
        - heading "1.2 CLIP噪声标签问题的独特性" [level=3] [ref=e330]
        - paragraph [ref=e331]: 与传统的噪声标签学习相比，CLIP面临三个独特挑战：
        - list [ref=e332]:
          - listitem [ref=e333]:
            - strong [ref=e334]: 多模态表征耦合
            - text: ：噪声标签同时影响视觉编码器和文本编码器的联合优化
          - listitem [ref=e335]:
            - strong [ref=e336]: 提示学习的脆弱性
            - text: ：基于可学习提示（prompt）的微调范式对标签质量敏感
          - listitem [ref=e337]:
            - strong [ref=e338]: 零样本先验的利用
            - text: ：如何利用CLIP预训练中积累的丰富知识来抵抗噪声干扰
        - heading "二、核心方法分类与详细分析" [level=2] [ref=e339]
        - paragraph [ref=e340]: 根据现有研究，CLIP噪声标签学习的方法可分为四大类：
        - heading "2.1 基于样本选择与清洗的方法" [level=3] [ref=e341]
        - paragraph [ref=e342]:
          - strong [ref=e343]: 核心思想
          - text: ：利用CLIP的零样本能力或预训练知识，在训练前或训练过程中识别并剔除/纠正噪声样本。
        - heading "代表工作：" [level=4] [ref=e344]
        - paragraph [ref=e345]:
          - strong [ref=e346]: "（1）CLIPCleaner: Cleaning Noisy Labels with CLIP"
          - text: （Feng et al., 2024）
        - list [ref=e347]:
          - listitem [ref=e348]:
            - strong [ref=e349]: 核心方法
            - text: ：提出利用CLIP预训练模型作为“清洁器”，通过计算图像与文本描述之间的语义相似度来检测噪声标签。该方法在训练开始前先对数据集进行清洗，将CLIP视为一个强监督信号源。
          - listitem [ref=e350]:
            - strong [ref=e351]: 创新点
            - text: ：避免了传统“小损失”策略中的自确认偏差（self-confirmation bias），因为CLIP的语义理解不依赖于下游训练过程。
          - listitem [ref=e352]:
            - strong [ref=e353]: 局限性
            - text: ：依赖CLIP的零样本分类能力，当目标域与CLIP预训练数据分布差异较大时，清洗效果可能下降。
        - paragraph [ref=e354]:
          - strong [ref=e355]: （2）Vision-Language Models are Strong Noisy Label Detectors
          - text: （Wei et al., 2024）
        - list [ref=e356]:
          - listitem [ref=e357]:
            - strong [ref=e358]: 核心方法
            - text: ：从理论角度证明视觉语言模型（尤其是CLIP）天然具备更强的噪声标签检测能力。提出利用CLIP提取的多模态特征来构建噪声检测器，在多个基准数据集上取得SOTA结果。
          - listitem [ref=e359]:
            - strong [ref=e360]: 创新点
            - text: ：揭示了CLIP的跨模态对比学习机制使其对标签噪声具有天然鲁棒性，并设计了基于特征相似度的检测框架。
          - listitem [ref=e361]:
            - strong [ref=e362]: 局限性
            - text: ：检测性能受限于CLIP的预训练数据覆盖范围。
        - paragraph [ref=e363]:
          - strong [ref=e364]: "（3）CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels"
          - text: （Deng et al., 2024）
        - list [ref=e365]:
          - listitem [ref=e366]:
            - strong [ref=e367]: 核心方法
            - text: ：针对小样本场景下的噪声标签问题，提出结合CLIP的域适应能力和样本选择机制。通过多轮迭代，利用CLIP的零样本预测作为参考，逐步筛选干净样本。
          - listitem [ref=e368]:
            - strong [ref=e369]: 创新点
            - text: ：专门解决了小样本+噪声标签这一困难设定，设计了域感知的样本选择策略。
          - listitem [ref=e370]:
            - strong [ref=e371]: 局限性
            - text: ：计算开销较大，需要多次前向传播。
        - heading "2.2 基于鲁棒提示学习的方法" [level=3] [ref=e372]
        - paragraph [ref=e373]:
          - strong [ref=e374]: 核心思想
          - text: ：设计对噪声标签具有内在鲁棒性的提示学习范式，使模型在噪声环境下仍能学到正确的分类边界。
        - heading "代表工作：" [level=4] [ref=e375]
        - paragraph [ref=e376]:
          - strong [ref=e377]: （1）Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?
          - text: （Wu et al., 2023）
        - list [ref=e378]:
          - listitem [ref=e379]:
            - strong [ref=e380]: 核心方法
            - text: ：通过大量实验揭示了提示学习（prompt tuning）对噪声标签具有出人意料的鲁棒性。研究发现，即使标签噪声率高达40%，基于可学习文本提示的微调方法仍能保持较好的分类性能。
          - listitem [ref=e381]:
            - strong [ref=e382]: 创新点
            - text: ：首次系统分析了提示学习鲁棒性的原因——提示向量通过梯度下降学习的是“语义方向”而非“具体实例”，因此对个别错误标签不敏感。
          - listitem [ref=e383]:
            - strong [ref=e384]: 局限性
            - text: ：鲁棒性主要体现在对称噪声场景，对非对称噪声（如类别相关的系统偏差）效果有限。
        - paragraph [ref=e385]:
          - strong [ref=e386]: "（2）NLPrompt: Noise-Label Prompt Learning for Vision-Language Models"
          - text: （Pan et al., 2024）
        - list [ref=e387]:
          - listitem [ref=e388]:
            - strong [ref=e389]: 核心方法
            - text: ：专门针对噪声标签场景设计的提示学习方法。提出噪声感知的提示优化策略，在提示学习过程中引入标签置信度估计和自适应正则化。
          - listitem [ref=e390]:
            - strong [ref=e391]: 创新点
            - text: ：将噪声标签建模为学习过程中的不确定性，通过贝叶斯视角优化提示向量。
          - listitem [ref=e392]:
            - strong [ref=e393]: 局限性
            - text: ：超参数对噪声率敏感，需要一定的先验知识。
        - paragraph [ref=e394]:
          - strong [ref=e395]: "（3）SelfPrompt: Confidence-Aware Semi-Supervised Tuning"
          - text: （Roy & Etemad, 2025）
        - list [ref=e396]:
          - listitem [ref=e397]:
            - strong [ref=e398]: 核心方法
            - text: ：在半监督学习框架下，提出置信度感知的提示调优方法。利用CLIP自身的校准能力来生成高质量伪标签，同时抑制噪声传播。
          - listitem [ref=e399]:
            - strong [ref=e400]: 创新点
            - text: ：结合了自训练和提示学习的优势，设计了动态置信度阈值机制。
          - listitem [ref=e401]:
            - strong [ref=e402]: 局限性
            - text: ：在极端噪声（>60%）场景下性能退化明显。
        - heading "2.3 基于对比学习增强的方法" [level=3] [ref=e403]
        - paragraph [ref=e404]:
          - strong [ref=e405]: 核心思想
          - text: ：通过改进对比学习的目标函数或数据增强策略，增强模型对噪声标签的容忍度。
        - heading "代表工作：" [level=4] [ref=e406]
        - paragraph [ref=e407]:
          - strong [ref=e408]: （1）Transductive CLIP with Class-Conditional Contrastive Learning
          - text: （Huang et al., 2022）
        - list [ref=e409]:
          - listitem [ref=e410]:
            - strong [ref=e411]: 核心方法
            - text: ：提出直推式（transductive）CLIP框架，利用类条件对比学习来缓解CLIP生成的伪标签中的噪声问题。通过构建类别级别的对比约束，减少噪声样本对特征空间的污染。
          - listitem [ref=e412]:
            - strong [ref=e413]: 创新点
            - text: ：将直推式学习引入CLIP噪声标签场景，利用无标签数据的分布信息辅助训练。
          - listitem [ref=e414]:
            - strong [ref=e415]: 局限性
            - text: ：需要假设测试数据分布与训练数据一致。
        - paragraph [ref=e416]:
          - strong [ref=e417]: （2）Fine-tuning Pre-trained VLMs in a Human-Annotation-Free Manner
          - text: （Wang et al., 2026）
        - list [ref=e418]:
          - listitem [ref=e419]:
            - strong [ref=e420]: 核心方法
            - text: ：提出完全无需人工标注的微调框架，利用CLIP自身生成的伪标签进行自训练。通过设计可靠的置信度过滤机制和一致性正则化，消除伪标签中的噪声。
          - listitem [ref=e421]:
            - strong [ref=e422]: 创新点
            - text: ：实现了从“无标注”到“高质量”的闭环学习，极大降低了标注成本。
          - listitem [ref=e423]:
            - strong [ref=e424]: 局限性
            - text: ：对CLIP的初始零样本性能有较高要求。
        - heading "2.4 基于多模态协同的方法" [level=3] [ref=e425]
        - paragraph [ref=e426]:
          - strong [ref=e427]: 核心思想
          - text: ：利用视觉和文本两个模态的信息相互验证，共同抵抗噪声干扰。
        - heading "代表工作：" [level=4] [ref=e428]
        - paragraph [ref=e429]:
          - strong [ref=e430]: （1）Noise-aware few-shot learning through bi-directional multi-view prompt alignment
          - text: （Niu & Xue, 2026）
        - list [ref=e431]:
          - listitem [ref=e432]:
            - strong [ref=e433]: 核心方法
            - text: ：提出双向多视角提示对齐机制，从视觉和文本两个方向同时检测和纠正噪声。通过跨模态一致性约束，使模型对单模态的噪声具有鲁棒性。
          - listitem [ref=e434]:
            - strong [ref=e435]: 创新点
            - text: ：双向对齐策略比单向方法更全面，能捕捉到更多噪声模式。
          - listitem [ref=e436]:
            - strong [ref=e437]: 局限性
            - text: ：训练复杂度较高，需要同时优化两组提示。
        - paragraph [ref=e438]:
          - strong [ref=e439]: （2）Pre-Trained VLMs as Partial Annotators
          - text: （Wang et al., 2024）
        - list [ref=e440]:
          - listitem [ref=e441]:
            - strong [ref=e442]: 核心方法
            - text: ：将预训练的视觉语言模型作为部分标注器，利用其置信度来决定哪些样本需要人工复核，哪些可以直接用于训练。通过主动学习策略，最小化噪声影响。
          - listitem [ref=e443]:
            - strong [ref=e444]: 创新点
            - text: ：将噪声标签问题转化为主动学习问题，实现了人机协作的标注优化。
          - listitem [ref=e445]:
            - strong [ref=e446]: 局限性
            - text: ：仍需要一定量的人工标注，不是完全自动化方案。
        - heading "三、方法对比分析" [level=2] [ref=e447]
        - table [ref=e448]:
          - rowgroup [ref=e449]:
            - row "方法类别 代表工作 噪声容忍度 计算开销 适用场景 主要局限" [ref=e450]:
              - columnheader "方法类别" [ref=e451]
