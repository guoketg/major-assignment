      - generic [ref=e1097]:
        - paragraph [ref=e1098]: 我来进行系统的文献调研，首先从多个关键词搜索相关论文。# CLIP模型噪声标签问题综述
        - heading "一、领域简介" [level=2] [ref=e1131]
        - paragraph [ref=e1132]: CLIP（Contrastive Language-Image Pre-training）作为多模态视觉语言基础模型，通过在4亿图文对上训练对比学习目标，展现了强大的零样本泛化能力。然而，CLIP面临的噪声标签问题体现在两个层面：
        - list [ref=e1133]:
          - listitem [ref=e1134]:
            - strong [ref=e1135]: 训练阶段的噪声对应（Noisy Correspondence）
            - text: ：CLIP依赖从互联网爬取的图文数据，这些数据天然包含大量不对齐的图文对（如LAION-5B等数据集），导致模型学到错误的跨模态对应关系。
          - listitem [ref=e1136]:
            - strong [ref=e1137]: 下游适配阶段的标签噪声
            - text: ：将CLIP适配到具体下游任务时，人工标注成本高，常使用弱监督或自动标注，引入类别标签噪声。
        - paragraph [ref=e1138]:
          - text: 近年来，针对CLIP噪声标签的研究形成了三个主要方向：
          - strong [ref=e1139]: 噪声标签鲁棒性分析
          - text: 、
          - strong [ref=e1140]: 基于CLIP的噪声标签清洗
          - text: 、
          - strong [ref=e1141]: 鲁棒的提示学习与微调方法
          - text: 。
        - separator [ref=e1142]
        - heading "二、核心方法分类与论文分析" [level=2] [ref=e1143]
        - heading "分类一：CLIP对噪声标签的鲁棒性分析与理论理解" [level=3] [ref=e1144]
        - table [ref=e1145]:
          - rowgroup [ref=e1146]:
            - row "论文 核心发现" [ref=e1147]:
              - columnheader "论文" [ref=e1148]
              - columnheader "核心发现" [ref=e1149]
          - rowgroup [ref=e1150]:
            - row "Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels? (Wu et al., 2023) ✅ 发现提示学习（Prompt Tuning）对标签噪声高度鲁棒。原因在于CLIP预训练提供的强先验知识限制了模型对错误标签的过拟合，噪声样本的梯度被预训练特征空间抑制。" [ref=e1151]:
              - cell "Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels? (Wu et al., 2023)" [ref=e1152]:
                - strong [ref=e1153]: Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?
                - text: (Wu et al., 2023)
              - cell "✅ 发现提示学习（Prompt Tuning）对标签噪声高度鲁棒。原因在于CLIP预训练提供的强先验知识限制了模型对错误标签的过拟合，噪声样本的梯度被预训练特征空间抑制。" [ref=e1154]
            - row "Intrinsic Gradient Suppression for Label-Noise Prompt Tuning (Li et al., 2026) ✅ 进一步揭示噪声样本会产生不成比例的大梯度，但CLIP的预训练先验可以天然抑制这种干扰。提出显式的梯度抑制策略来增强鲁棒性。" [ref=e1155]:
              - cell "Intrinsic Gradient Suppression for Label-Noise Prompt Tuning (Li et al., 2026)" [ref=e1156]:
                - strong [ref=e1157]: Intrinsic Gradient Suppression for Label-Noise Prompt Tuning
                - text: (Li et al., 2026)
              - cell "✅ 进一步揭示噪声样本会产生不成比例的大梯度，但CLIP的预训练先验可以天然抑制这种干扰。提出显式的梯度抑制策略来增强鲁棒性。" [ref=e1158]
            - row "Transductive CLIP with Class-Conditional Contrastive Learning (Huang et al., 2022) ✅ 指出CLIP在零样本场景下的监督信号本身包含标签噪声，提出类别条件对比学习来缓解。" [ref=e1159]:
              - cell "Transductive CLIP with Class-Conditional Contrastive Learning (Huang et al., 2022)" [ref=e1160]:
                - strong [ref=e1161]: Transductive CLIP with Class-Conditional Contrastive Learning
                - text: (Huang et al., 2022)
              - cell "✅ 指出CLIP在零样本场景下的监督信号本身包含标签噪声，提出类别条件对比学习来缓解。" [ref=e1162]
        - paragraph [ref=e1163]:
          - strong [ref=e1164]: 证据等级
          - text: ：✅ 已证实——多篇论文一致验证CLIP的预训练先验对噪声标签具有天然鲁棒性，且提示学习比全微调更鲁棒。
        - separator [ref=e1165]
        - heading "分类二：基于CLIP的噪声标签检测与清洗" [level=3] [ref=e1166]
        - table [ref=e1167]:
          - rowgroup [ref=e1168]:
            - row "论文 方法 创新点" [ref=e1169]:
              - columnheader "论文" [ref=e1170]
              - columnheader "方法" [ref=e1171]
              - columnheader "创新点" [ref=e1172]
          - rowgroup [ref=e1173]:
            - 'row "CLIPCleaner: Cleaning Noisy Labels with CLIP (Feng et al., 2024) 利用CLIP的零样本能力作为外部先验，识别训练集中的噪声样本。将CLIP预测与模型训练损失结合进行样本筛选。 避免传统\"小损失\"策略的自我确认偏差（self-confirmation bias），CLIP提供独立的、未被污染的先验。" [ref=e1174]':
              - 'cell "CLIPCleaner: Cleaning Noisy Labels with CLIP (Feng et al., 2024)" [ref=e1175]':
                - strong [ref=e1176]: "CLIPCleaner: Cleaning Noisy Labels with CLIP"
                - text: (Feng et al., 2024)
              - cell "利用CLIP的零样本能力作为外部先验，识别训练集中的噪声样本。将CLIP预测与模型训练损失结合进行样本筛选。" [ref=e1177]
              - cell "避免传统\"小损失\"策略的自我确认偏差（self-confirmation bias），CLIP提供独立的、未被污染的先验。" [ref=e1178]
            - 'row "CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels (Deng et al., 2024) 在少样本场景下，利用CLIP的图文嵌入相似度来对抗噪声标签对特征学习的干扰。 结合域适应策略，增强CLIP在新域上的特征鲁棒性。" [ref=e1179]':
              - 'cell "CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels (Deng et al., 2024)" [ref=e1180]':
                - strong [ref=e1181]: "CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels"
                - text: (Deng et al., 2024)
              - cell "在少样本场景下，利用CLIP的图文嵌入相似度来对抗噪声标签对特征学习的干扰。" [ref=e1182]
              - cell "结合域适应策略，增强CLIP在新域上的特征鲁棒性。" [ref=e1183]
            - row "Unlearning the Noisy Correspondence Makes CLIP More Robust (Han et al., 2025) 提出\"遗忘\"噪声对应样本的策略，识别并移除语义不相关的图文对。 从反事实学习角度处理噪声对应，而非直接筛选干净样本。" [ref=e1184]:
