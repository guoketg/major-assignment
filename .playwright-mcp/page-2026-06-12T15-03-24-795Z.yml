                - text: (Han et al., 2025)
              - cell "提出\"遗忘\"噪声对应样本的策略，识别并移除语义不相关的图文对。" [ref=e1187]
              - cell "从反事实学习角度处理噪声对应，而非直接筛选干净样本。" [ref=e1188]
