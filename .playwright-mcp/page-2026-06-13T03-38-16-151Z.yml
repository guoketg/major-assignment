        - separator [ref=e870]
        - heading "四、关键争议点与未解问题" [level=2] [ref=e871]
        - heading "✅ 已证实的结论" [level=3] [ref=e872]
        - list [ref=e873]:
          - listitem [ref=e874]:
            - strong [ref=e875]: Prompt tuning对噪声标签天然鲁棒
            - text: （Wu et al., 2023）：由于只更新少量参数且冻结预训练编码器，prompt tuning在噪声标签下表现出色。
          - listitem [ref=e876]:
            - strong [ref=e877]: CLIP作为噪声检测器有效
            - text: （Wei et al., 2024; CLIPCleaner）：CLIP的图文对齐能力可以可靠地识别噪声样本。
          - listitem [ref=e878]:
            - strong [ref=e879]: 样本选择与训练解耦优于自训练
            - text: （CLIPCleaner）：避免self-confirmation bias是提升噪声标签学习效果的关键。
        - heading "⚠️ 争议点" [level=3] [ref=e880]
        - list [ref=e881]:
          - listitem [ref=e882]:
            - strong [ref=e883]: CLIP的鲁棒性是来自预训练还是来自架构？
            - text: Wu et al.（2023）认为是预训练先验，但部分学者认为是对比学习架构本身（对称性、温度系数）导致的。
          - listitem [ref=e884]:
            - strong [ref=e885]: prompt tuning vs. full fine-tuning在噪声下的权衡
            - text: ：prompt tuning更鲁棒但可能容量不足，full fine-tuning性能上限更高但对噪声更敏感。
        - heading "❓ 资料不足" [level=3] [ref=e886]
        - list [ref=e887]:
          - listitem [ref=e888]:
            - strong [ref=e889]: CLIP在结构噪声（如标签错位、缺失标签）下的表现
            - text: ：现有研究主要关注随机噪声或对称噪声，对更复杂的噪声类型研究不足。
          - listitem [ref=e890]:
            - strong [ref=e891]: 多模态噪声的联合建模
            - text: ：当图像和文本同时存在噪声时，如何协同处理？
          - listitem [ref=e892]:
            - strong [ref=e893]: CLIP噪声标签学习在医疗、遥感等专业领域的应用
            - text: ：跨域迁移时的去噪策略尚缺乏系统研究。
        - separator [ref=e894]
        - heading "五、未来研究方向" [level=2] [ref=e895]
        - list [ref=e896]:
          - listitem [ref=e897]:
            - paragraph [ref=e898]:
              - strong [ref=e899]: 统一的多模态噪声处理框架
              - text: ：将样本选择、标签校正、鲁棒训练集成到一个端到端框架中，而不是分步处理。
          - listitem [ref=e900]:
            - paragraph [ref=e901]:
              - strong [ref=e902]: 噪声感知的提示学习
              - text: ：结合大语言模型（LLM）生成动态提示，使prompt能够根据噪声水平自适应调整。
          - listitem [ref=e903]:
            - paragraph [ref=e904]:
              - strong [ref=e905]: 跨域噪声标签学习
              - text: ：研究CLIP在源域和目标域分布差异下的噪声鲁棒性，尤其是在域偏移+噪声标签的复杂场景。
          - listitem [ref=e906]:
            - paragraph [ref=e907]:
              - strong [ref=e908]: 可解释的噪声检测
              - text: ：利用CLIP的注意力机制和多模态对齐特性，提供样本被判定为噪声的可解释性理由。
          - listitem [ref=e909]:
            - paragraph [ref=e910]:
              - strong [ref=e911]: 大规模噪声数据预训练的改进
              - text: ：借鉴MOFI的思路，探索如何从更大规模、更嘈杂的互联网数据中预训练更鲁棒的视觉-语言模型。
          - listitem [ref=e912]:
            - paragraph [ref=e913]:
              - strong [ref=e914]: 与扩散模型结合
              - text: ：如Label-Retrieval-Augmented Diffusion Models（Chen et al., 2023）所示，利用生成模型进行标签校正是一个有前景的方向。
        - separator [ref=e915]
        - heading "六、总结" [level=2] [ref=e916]
        - paragraph [ref=e917]: CLIP噪声标签学习是一个快速发展的交叉领域，融合了视觉-语言模型、鲁棒学习和少样本学习等多个方向。当前研究已经证明：
        - list [ref=e918]:
          - listitem [ref=e919]:
            - text: CLIP的预训练知识可以
            - strong [ref=e920]: 显著提升
            - text: 噪声标签学习的鲁棒性；
          - listitem [ref=e921]:
            - strong [ref=e922]: 样本选择与训练解耦
            - text: 是克服self-confirmation bias的有效途径；
          - listitem [ref=e923]:
            - strong [ref=e924]: prompt tuning
            - text: 在噪声场景下具有天然优势，是实际部署的首选方案。
        - paragraph [ref=e925]: 然而，在跨域迁移、复杂噪声类型、多模态联合去噪等方面仍存在大量开放问题。随着视觉-语言基础模型的持续演进，噪声标签学习有望从"被动防御"转向"主动利用"——即从噪声数据中学习更鲁棒、更通用的表示，而非仅仅清洗噪声。
        - separator [ref=e926]
        - paragraph [ref=e927]:
          - emphasis [ref=e928]: 本综述基于对arXiv上20+篇相关论文的系统调研，涵盖了2021-2026年的主要进展。
      - generic [ref=e931]:
        - heading "CLIP噪声标签学习综述：方法、挑战与未来方向" [level=1] [ref=e932]
        - heading "一、领域简介" [level=2] [ref=e933]
        - paragraph [ref=e934]: 随着CLIP（Contrastive Language-Image Pre-training）等视觉-语言基础模型的兴起，零样本和少样本学习能力取得了突破性进展。然而，现实世界中的数据标注不可避免会引入标签噪声——无论是来自网络爬取的弱监督数据，还是人工标注中的主观错误。噪声标签会严重损害模型在下游任务上的泛化性能。
        - paragraph [ref=e935]:
          - text: CLIP模型本身在大规模图文对（如WIT-400M）上预训练时就已经暴露在大量噪声中，但其对比学习目标（InfoNCE loss）天然具有一定的鲁棒性。然而，当在下游任务上进行微调（如prompt tuning或linear probing）时，噪声标签的影响会显著放大。近年来，学术界围绕"
          - strong [ref=e936]: 如何利用CLIP的预训练知识来对抗噪声标签
          - text: "\"这一核心问题，形成了多个研究方向。"
        - separator [ref=e937]
        - heading "二、核心方法分类" [level=2] [ref=e938]
        - heading "1. 基于CLIP的样本选择与清洗（Sample Selection & Cleaning）" [level=3] [ref=e939]
        - paragraph [ref=e940]:
          - strong [ref=e941]: "代表工作：CLIPCleaner: Cleaning Noisy Labels with CLIP（Feng et al., 2024, arXiv:2408.10012）"
        - list [ref=e942]:
          - listitem [ref=e943]:
            - strong [ref=e944]: 核心思想
            - text: ：利用CLIP的零样本分类能力，在
            - strong [ref=e945]: 不依赖训练中模型
            - text: 的情况下进行样本选择。CLIP通过自动生成的LLM描述性提示（如"a photo of a dog, which has four legs and floppy ears"）对样本进行零样本分类，选择高置信度的样本作为干净样本。
          - listitem [ref=e946]:
            - strong [ref=e947]: 创新点
            - text: ：样本选择与训练过程
            - strong [ref=e948]: 完全解耦
            - text: ，避免了传统"小损失"方法中"自我确认偏差"（self-confirmation bias）的问题。同时，CLIP的语义感知能力可以处理视觉上相似类别之间的"硬噪声"（hard noise）。
          - listitem [ref=e949]:
            - strong [ref=e950]: 优势
            - text: ：一次性完成，计算开销低；对噪声类型不敏感。
          - listitem [ref=e951]:
            - strong [ref=e952]: 局限
            - text: ：严重依赖CLIP在目标域上的零样本性能，若目标域与CLIP预训练分布差异较大，效果会显著下降。
        - paragraph [ref=e953]:
          - strong [ref=e954]: 代表工作：Vision-Language Models are Strong Noisy Label Detectors（Wei et al., 2024, arXiv:2409.19696）
        - list [ref=e955]:
          - listitem [ref=e956]:
            - strong [ref=e957]: 核心思想
            - text: ：系统性地验证了视觉-语言模型（尤其是CLIP）作为噪声标签检测器的能力。通过对比图像-文本对的语义一致性得分，可以可靠地识别出噪声样本。
          - listitem [ref=e958]:
            - strong [ref=e959]: 创新点
            - text: ：将CLIP的图文对齐能力直接用作噪声检测指标，无需额外训练。
          - listitem [ref=e960]:
            - strong [ref=e961]: 优势
            - text: ：方法简单高效，可作为预处理步骤。
          - listitem [ref=e962]:
            - strong [ref=e963]: 局限
            - text: ：对于多义性样本（如一张图可以对应多个正确标签）可能产生误判。
        - paragraph [ref=e964]:
          - strong [ref=e965]: "代表工作：LEMoN: Label Error Detection using Multimodal Neighbors（Zhang et al., 2024, arXiv:2407.18941）"
        - list [ref=e966]:
          - listitem [ref=e967]:
            - strong [ref=e968]: 核心思想
            - text: ：利用多模态邻居（即与目标样本在图文嵌入空间中最接近的邻居）的一致性来检测标签错误。如果一个样本的标签与其多模态邻居的标签不一致，则被判定为噪声。
          - listitem [ref=e969]:
            - strong [ref=e970]: 创新点
            - text: ：结合了视觉和文本两个模态的邻居信息，比单一模态的检测更鲁棒。
          - listitem [ref=e971]:
            - strong [ref=e972]: 优势
            - text: ：利用邻居信息进行集体决策，减少单一样本的偶然性。
          - listitem [ref=e973]:
            - strong [ref=e974]: 局限
            - text: ：对邻居数量和质量敏感，在低密度区域效果下降。
        - separator [ref=e975]
        - heading "2. 鲁棒提示学习（Robust Prompt Tuning）" [level=3] [ref=e976]
        - paragraph [ref=e977]:
          - strong [ref=e978]: 代表工作：Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?（Wu et al., 2023, arXiv:2307.11978）
        - list [ref=e979]:
          - listitem [ref=e980]:
            - strong [ref=e981]: 核心发现
            - text: ：作者通过实验发现，prompt tuning（如CoOp、CoCoOp）在噪声标签下表现出
            - strong [ref=e982]: 惊人的鲁棒性
            - text: 。进一步分析表明，这是因为prompt tuning只更新少量参数（文本端的prompt tokens），而冻结了视觉编码器和文本编码器。预训练得到的强先验知识（strong prior）使得模型不会轻易被少数噪声样本带偏。
          - listitem [ref=e983]:
            - strong [ref=e984]: 创新点
            - text: ：首次从理论和实验角度解释了prompt tuning对噪声标签的鲁棒性来源。
          - listitem [ref=e985]:
            - strong [ref=e986]: 优势
            - text: ：参数高效、天然抗噪、适合少样本场景。
          - listitem [ref=e987]:
            - strong [ref=e988]: 局限
            - text: ：当噪声比例极高（>60%）时，鲁棒性仍然会受到侵蚀。
        - paragraph [ref=e989]:
          - strong [ref=e990]: "代表工作：NLPrompt: Noise-Label Prompt Learning for Vision-Language Models（Pan et al., 2024, arXiv:2412.01256）"
        - list [ref=e991]:
          - listitem [ref=e992]:
            - strong [ref=e993]: 核心思想
            - text: ：针对prompt tuning在噪声标签下性能下降的问题，提出了一种噪声感知的prompt学习方法。通过引入噪声鲁棒的损失函数和样本权重调整机制，在prompt学习过程中动态降低噪声样本的影响。
          - listitem [ref=e994]:
            - strong [ref=e995]: 创新点
            - text: ：将噪声标签建模与prompt优化联合进行。
          - listitem [ref=e996]:
            - strong [ref=e997]: 优势
            - text: ：在中等噪声比例下优于标准prompt tuning。
          - listitem [ref=e998]:
            - strong [ref=e999]: 局限
            - text: ：需要额外的噪声比例估计，实际应用中较难准确获取。
        - paragraph [ref=e1000]:
          - strong [ref=e1001]: 代表工作：Intrinsic Gradient Suppression for Label-Noise Prompt Tuning in Vision-Language Models（Li et al., 2026, arXiv:2605.00591）
        - list [ref=e1002]:
          - listitem [ref=e1003]:
            - strong [ref=e1004]: 核心思想
            - text: ：发现噪声样本会产生
            - strong [ref=e1005]: 不成比例的大梯度
            - text: ，从而主导优化方向。作者提出内在梯度抑制（IGS）机制，通过分析梯度范数自动检测并抑制噪声样本的梯度。
          - listitem [ref=e1006]:
            - strong [ref=e1007]: 创新点
            - text: ：不需要显式的样本选择或噪声比例估计，全自动处理。
          - listitem [ref=e1008]:
            - strong [ref=e1009]: 优势
            - text: ：端到端训练，适应性强。
          - listitem [ref=e1010]:
            - strong [ref=e1011]: 局限
            - text: ：梯度分析增加了计算开销。
        - paragraph [ref=e1012]:
          - strong [ref=e1013]: "代表工作：Seeing is Believing: Robust Vision-Guided Cross-Modal Prompt Learning under Label Noise（Geng et al., 2026, arXiv:2604.09532）"
        - list [ref=e1014]:
          - listitem [ref=e1015]:
            - strong [ref=e1016]: 核心思想
            - text: ：提出视觉引导的跨模态提示学习。核心假设是：
            - strong [ref=e1017]: 视觉内容比文本标签包含更丰富、更可靠的语义信息
            - text: 。因此，在prompt学习过程中，利用视觉特征的一致性来纠正噪声标签的影响。
          - listitem [ref=e1018]:
            - strong [ref=e1019]: 创新点
            - text: ：从视觉模态出发引导文本模态的优化，双向校正。
          - listitem [ref=e1020]:
            - strong [ref=e1021]: 优势
            - text: ：对高噪声比例场景鲁棒。
          - listitem [ref=e1022]:
            - strong [ref=e1023]: 局限
            - text: ：依赖高质量视觉特征提取，在低质量图像上可能失效。
        - separator [ref=e1024]
        - heading "3. 少样本场景下的噪声鲁棒方法" [level=3] [ref=e1025]
        - paragraph [ref=e1026]:
          - strong [ref=e1027]: "代表工作：CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels（Deng et al., 2024, arXiv:2412.12793）"
        - list [ref=e1028]:
          - listitem [ref=e1029]:
            - strong [ref=e1030]: 核心思想
            - text: ：在少样本学习（FSL）场景下，噪声标签的危害更大，因为样本数量少，噪声样本难以被稀释。CRoF结合CLIP的图像-文本嵌入相似度，设计了一种域自适应和噪声鲁棒的训练框架。
          - listitem [ref=e1031]:
            - strong [ref=e1032]: 创新点
            - text: ：将域对齐与噪声标签处理统一到少样本框架中。
          - listitem [ref=e1033]:
            - strong [ref=e1034]: 优势
            - text: ：在跨域的少样本噪声场景下表现优异。
          - listitem [ref=e1035]:
            - strong [ref=e1036]: 局限
            - text: ：需要额外的未标记目标域数据用于域自适应。
        - separator [ref=e1037]
        - heading "4. 噪声标签校正与伪标签生成" [level=3] [ref=e1038]
        - paragraph [ref=e1039]:
          - strong [ref=e1040]: 代表工作：Transductive CLIP with Class-Conditional Contrastive Learning（Huang et al., 2022, arXiv:2206.06177）
        - list [ref=e1041]:
          - listitem [ref=e1042]:
            - strong [ref=e1043]: 核心思想
            - text: ：利用CLIP的监督信号来缓解数据标注负担，但意识到这种监督中不可避免地包含噪声。作者提出直推式（transductive）学习方法，通过类条件对比学习来校正CLIP产生的伪标签中的噪声。
          - listitem [ref=e1044]:
            - strong [ref=e1045]: 创新点
            - text: ：将CLIP作为教师模型生成伪标签，同时设计去噪机制。
          - listitem [ref=e1046]:
            - strong [ref=e1047]: 优势
            - text: ：无需人工标注，完全自动化。
          - listitem [ref=e1048]:
            - strong [ref=e1049]: 局限
            - text: ：教师模型（CLIP）的偏差会被传递给学生模型。
        - paragraph [ref=e1050]:
          - strong [ref=e1051]: 代表工作：Label-Retrieval-Augmented Diffusion Models for Learning from Noisy Labels（Chen et al., 2023, arXiv:2305.19518）
        - list [ref=e1052]:
          - listitem [ref=e1053]:
            - strong [ref=e1054]: 核心思想
            - text: ：利用扩散模型（diffusion models）来校正噪声标签。通过检索与噪声样本语义相似的干净标签，再使用扩散模型生成高质量的校正标签。
          - listitem [ref=e1055]:
            - strong [ref=e1056]: 创新点
            - text: ：将生成模型（扩散模型）引入噪声标签校正，开辟了新的技术路线。
          - listitem [ref=e1057]:
            - strong [ref=e1058]: 优势
            - text: ：可以处理高度噪声和复杂噪声模式。
          - listitem [ref=e1059]:
            - strong [ref=e1060]: 局限
            - text: ：扩散模型推理成本高，且依赖外部检索库。
        - paragraph [ref=e1061]:
          - strong [ref=e1062]: 代表工作：Fine-tuning Pre-trained Vision-Language Models in a Human-Annotation-Free Manner（Wang et al., 2026, arXiv:2602.04337）
        - list [ref=e1063]:
          - listitem [ref=e1064]:
            - strong [ref=e1065]: 核心思想
            - text: ：探索完全无需人工标注的CLIP微调方法。通过自训练和伪标签生成，同时设计策略来抑制伪标签中的噪声。
          - listitem [ref=e1066]:
            - strong [ref=e1067]: 创新点
            - text: ：在零人工标注条件下实现了有竞争力的微调性能。
          - listitem [ref=e1068]:
            - strong [ref=e1069]: 优势
            - text: ：完全自动化，成本低。
          - listitem [ref=e1070]:
            - strong [ref=e1071]: 局限
            - text: ：性能仍落后于使用少量干净标注的方法。
        - separator [ref=e1072]
        - heading "5. 梯度约束与优化方法" [level=3] [ref=e1073]
        - paragraph [ref=e1074]:
          - strong [ref=e1075]: 代表工作：Optimized Gradient Clipping for Noisy Label Learning（Ye et al., 2024, arXiv:2412.08941）
        - list [ref=e1076]:
          - listitem [ref=e1077]:
            - strong [ref=e1078]: 核心思想
            - text: ：发现对损失函数相对于模型预测概率的梯度进行约束可以增强模型对噪声标签的鲁棒性。作者提出通过验证数据确定最优梯度裁剪阈值。
          - listitem [ref=e1079]:
            - strong [ref=e1080]: 创新点
            - text: ：将梯度裁剪从通用优化技巧提升为专门的噪声鲁棒策略。
          - listitem [ref=e1081]:
            - strong [ref=e1082]: 优势
            - text: ：方法通用，可与其他噪声标签方法结合。
          - listitem [ref=e1083]:
            - strong [ref=e1084]: 局限
            - text: ：需要验证数据来调优阈值，且固定阈值可能不适应噪声分布的变化。
        - separator [ref=e1085]
        - heading "三、各方法优缺点对比总结" [level=2] [ref=e1086]
        - table [ref=e1087]:
          - rowgroup [ref=e1088]:
