    - generic [ref=e18]:
      - generic [ref=e268]: 写一篇关于CLIP噪声标签的综述并导出为文档
      - generic [ref=e271]:
        - heading "CLIP 噪声标签学习综述：方法、挑战与未来方向" [level=1] [ref=e272]
        - heading "一、领域简介" [level=2] [ref=e273]
        - paragraph [ref=e274]: 随着 CLIP（Contrastive Language-Image Pre-training）等视觉-语言基础模型的兴起，零样本和少样本学习能力取得了突破性进展。然而，现实世界中的数据标注不可避免会引入标签噪声——无论是来自网络爬取的弱监督数据，还是人工标注中的主观错误。噪声标签会严重损害模型在下游任务上的泛化性能。
        - paragraph [ref=e275]:
          - text: CLIP 模型本身在大规模图文对（如 WIT-400M）上预训练时就已经暴露在大量噪声中，但其对比学习目标（InfoNCE loss）天然具有一定的鲁棒性。然而，当在下游任务上进行微调（如 prompt tuning 或 linear probing）时，噪声标签的影响会显著放大。近年来，学术界围绕“
          - strong [ref=e276]: 如何利用 CLIP 的预训练知识来对抗噪声标签
          - text: ”这一核心问题，形成了多个研究方向。
        - separator [ref=e277]
        - heading "二、核心方法分类" [level=2] [ref=e278]
        - heading "1. 基于 CLIP 的样本选择与清洗（Sample Selection & Cleaning）" [level=3] [ref=e279]
        - paragraph [ref=e280]:
          - strong [ref=e281]: 代表工作：CLIPCleaner（Feng et al., 2024）
        - list [ref=e282]:
          - listitem [ref=e283]:
            - strong [ref=e284]: 核心思想
            - text: ：利用 CLIP 的零样本分类能力，在
            - strong [ref=e285]: 不依赖训练中模型
            - text: 的情况下进行样本选择。CLIP 通过自动生成的 LLM 描述性提示（如“a photo of a dog, which has four legs and floppy ears”）对样本进行零样本分类，选择高置信度的样本作为干净样本。
          - listitem [ref=e286]:
            - strong [ref=e287]: 创新点
            - text: ：样本选择与训练过程
            - strong [ref=e288]: 完全解耦
            - text: ，避免了传统“小损失”方法中“自我确认偏差”（self-confirmation bias）的问题。同时，CLIP 的语义感知能力可以处理视觉上相似类别之间的“硬噪声”（hard noise）。
          - listitem [ref=e289]:
            - strong [ref=e290]: 优势
            - text: ：一次性完成，计算开销低；对噪声类型不敏感。
          - listitem [ref=e291]:
            - strong [ref=e292]: 局限
            - text: ：严重依赖 CLIP 在目标域上的零样本性能，若目标域与 CLIP 预训练分布差异较大，效果会显著下降。
        - paragraph [ref=e293]:
          - strong [ref=e294]: 代表工作：Vision-Language Models are Strong Noisy Label Detectors（Wei et al., 2024）
        - list [ref=e295]:
          - listitem [ref=e296]:
            - strong [ref=e297]: 核心思想
            - text: ：系统性地验证了视觉-语言模型（尤其是 CLIP）作为噪声标签检测器的能力。通过对比图像-文本对的语义一致性得分，可以可靠地识别出噪声样本。
          - listitem [ref=e298]:
            - strong [ref=e299]: 创新点
            - text: ：将 CLIP 的图文对齐能力直接用作噪声检测指标，无需额外训练。
          - listitem [ref=e300]:
            - strong [ref=e301]: 优势
            - text: ：方法简单高效，可作为预处理步骤。
          - listitem [ref=e302]:
            - strong [ref=e303]: 局限
            - text: ：对于多义性样本（如一张图可以对应多个正确标签）可能产生误判。
        - separator [ref=e304]
        - heading "2. 鲁棒提示学习（Robust Prompt Tuning）" [level=3] [ref=e305]
        - paragraph [ref=e306]:
          - strong [ref=e307]: 代表工作：Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?（Wu et al., 2023）
        - list [ref=e308]:
          - listitem [ref=e309]:
            - strong [ref=e310]: 核心发现
            - text: ：作者通过实验发现，prompt tuning（如 CoOp、CoCoOp）在噪声标签下表现出
            - strong [ref=e311]: 惊人的鲁棒性
            - text: 。进一步分析表明，这是因为 prompt tuning 只更新少量参数（文本端的 prompt tokens），而冻结了视觉编码器和文本编码器。预训练得到的强先验知识（strong prior）使得模型不会轻易被少数噪声样本带偏。
          - listitem [ref=e312]:
            - strong [ref=e313]: 创新点
            - text: ：首次从理论和实验角度解释了 prompt tuning 对噪声标签的鲁棒性来源。
          - listitem [ref=e314]:
            - strong [ref=e315]: 优势
            - text: ：参数高效、天然抗噪、适合少样本场景。
          - listitem [ref=e316]:
            - strong [ref=e317]: 局限
            - text: ：当噪声比例极高（>60%）时，鲁棒性仍然会受到侵蚀。
        - paragraph [ref=e318]:
          - strong [ref=e319]: "代表工作：NLPrompt: Noise-Label Prompt Learning for Vision-Language Models（Pan et al., 2024）"
        - list [ref=e320]:
          - listitem [ref=e321]:
            - strong [ref=e322]: 核心思想
            - text: ：针对 prompt tuning 在噪声标签下性能下降的问题，提出了一种噪声感知的 prompt 学习方法。通过引入噪声鲁棒的损失函数和样本权重调整机制，在 prompt 学习过程中动态降低噪声样本的影响。
          - listitem [ref=e323]:
            - strong [ref=e324]: 创新点
            - text: ：将噪声标签建模与 prompt 优化联合进行。
          - listitem [ref=e325]:
            - strong [ref=e326]: 优势
            - text: ：在中等噪声比例下优于标准 prompt tuning。
          - listitem [ref=e327]:
            - strong [ref=e328]: 局限
            - text: ：需要额外的噪声比例估计，实际应用中较难准确获取。
        - paragraph [ref=e329]:
          - strong [ref=e330]: 代表工作：Intrinsic Gradient Suppression for Label-Noise Prompt Tuning（Li et al., 2026）
        - list [ref=e331]:
          - listitem [ref=e332]:
            - strong [ref=e333]: 核心思想
            - text: ：发现噪声样本会产生
            - strong [ref=e334]: 不成比例的大梯度
            - text: ，从而主导优化方向。作者提出内在梯度抑制（IGS）机制，通过分析梯度范数自动检测并抑制噪声样本的梯度。
          - listitem [ref=e335]:
            - strong [ref=e336]: 创新点
            - text: ：不需要显式的样本选择或噪声比例估计，全自动处理。
          - listitem [ref=e337]:
            - strong [ref=e338]: 优势
            - text: ：端到端训练，适应性强。
          - listitem [ref=e339]:
            - strong [ref=e340]: 局限
            - text: ：梯度分析增加了计算开销。
        - paragraph [ref=e341]:
          - strong [ref=e342]: "代表工作：Seeing is Believing: Robust Vision-Guided Cross-Modal Prompt Learning under Label Noise（Geng et al., 2026）"
        - list [ref=e343]:
          - listitem [ref=e344]:
            - strong [ref=e345]: 核心思想
            - text: ：提出视觉引导的跨模态提示学习。核心假设是：
            - strong [ref=e346]: 视觉内容比文本标签包含更丰富、更可靠的语义信息
            - text: 。因此，在 prompt 学习过程中，利用视觉特征的一致性来纠正噪声标签的影响。
          - listitem [ref=e347]:
            - strong [ref=e348]: 创新点
            - text: ：从视觉模态出发引导文本模态的优化，双向校正。
          - listitem [ref=e349]:
            - strong [ref=e350]: 优势
            - text: ：对高噪声比例场景鲁棒。
          - listitem [ref=e351]:
            - strong [ref=e352]: 局限
            - text: ：依赖高质量视觉特征提取，在低质量图像上可能失效。
        - separator [ref=e353]
        - heading "3. 少样本场景下的噪声鲁棒方法" [level=3] [ref=e354]
        - paragraph [ref=e355]:
          - strong [ref=e356]: "代表工作：CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels（Deng et al., 2024）"
        - list [ref=e357]:
          - listitem [ref=e358]:
            - strong [ref=e359]: 核心思想
            - text: ：在少样本学习（FSL）场景下，噪声标签的危害更大，因为样本数量少，噪声样本难以被稀释。CRoF 结合 CLIP 的图像-文本嵌入相似度，设计了一种域自适应和噪声鲁棒的训练框架。
          - listitem [ref=e360]:
            - strong [ref=e361]: 创新点
            - text: ：将域对齐与噪声标签处理统一到少样本框架中。
          - listitem [ref=e362]:
            - strong [ref=e363]: 优势
            - text: ：在跨域的少样本噪声场景下表现优异。
          - listitem [ref=e364]:
            - strong [ref=e365]: 局限
            - text: ：需要额外的未标记目标域数据用于域自适应。
        - separator [ref=e366]
        - heading "4. 噪声标签校正与伪标签生成" [level=3] [ref=e367]
        - paragraph [ref=e368]:
          - strong [ref=e369]: 代表工作：Transductive CLIP with Class-Conditional Contrastive Learning（Huang et al., 2022）
        - list [ref=e370]:
          - listitem [ref=e371]:
            - strong [ref=e372]: 核心思想
            - text: ：利用 CLIP 的监督信号来缓解数据标注负担，但意识到这种监督中不可避免地包含噪声。作者提出直推式（transductive）学习方法，通过类条件对比学习来校正 CLIP 产生的伪标签中的噪声。
          - listitem [ref=e373]:
            - strong [ref=e374]: 创新点
            - text: ：将 CLIP 作为教师模型生成伪标签，同时设计去噪机制。
          - listitem [ref=e375]:
            - strong [ref=e376]: 优势
            - text: ：无需人工标注，完全自动化。
          - listitem [ref=e377]:
            - strong [ref=e378]: 局限
            - text: ：教师模型（CLIP）的偏差会被传递给学生模型。
        - paragraph [ref=e379]:
          - strong [ref=e380]: "代表工作：MOFI: Learning Image Representations from Noisy Entity Annotated Images（Wu et al., 2023）"
        - list [ref=e381]:
          - listitem [ref=e382]:
            - strong [ref=e383]: 核心思想
            - text: ：从噪声实体标注的图像中学习视觉表示。MOFI 提出了自动化的噪声标注数据构建方法，以及针对性的训练策略（如渐进式样本选择、多实例学习）。
          - listitem [ref=e384]:
            - strong [ref=e385]: 创新点
            - text: ：大规模噪声数据预训练的新范式。
          - listitem [ref=e386]:
            - strong [ref=e387]: 优势
            - text: ：能够从互联网级噪声数据中学习有效表示。
          - listitem [ref=e388]:
            - strong [ref=e389]: 局限
            - text: ：训练成本高，需要大规模计算资源。
