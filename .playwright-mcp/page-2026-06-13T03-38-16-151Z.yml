        - separator [ref=e1131]
        - heading "四、关键争议点与未解问题" [level=2] [ref=e1132]
        - heading "✅ 已证实的结论" [level=3] [ref=e1133]
        - list [ref=e1134]:
          - listitem [ref=e1135]:
            - paragraph [ref=e1136]:
              - strong [ref=e1137]: Prompt tuning对噪声标签天然鲁棒
              - text: （Wu et al., 2023）：由于只更新少量参数且冻结预训练编码器，prompt tuning在噪声标签下表现出色。这一发现已在多个基准数据集上得到验证。
          - listitem [ref=e1138]:
            - paragraph [ref=e1139]:
              - strong [ref=e1140]: CLIP作为噪声检测器有效
              - text: （Wei et al., 2024; CLIPCleaner; LEMoN）：CLIP的图文对齐能力可以可靠地识别噪声样本，三种独立的工作从不同角度证实了这一点。
          - listitem [ref=e1141]:
            - paragraph [ref=e1142]:
              - strong [ref=e1143]: 样本选择与训练解耦优于自训练
              - text: （CLIPCleaner）：避免self-confirmation bias是提升噪声标签学习效果的关键，CLIPCleaner的消融实验明确支持这一结论。
          - listitem [ref=e1144]:
            - paragraph [ref=e1145]:
              - strong [ref=e1146]: 梯度约束可以增强噪声鲁棒性
              - text: （Ye et al., 2024）：对梯度进行裁剪和约束是有效的噪声标签防御策略。
        - heading "⚠️ 争议点" [level=3] [ref=e1147]
        - list [ref=e1148]:
          - listitem [ref=e1149]:
            - paragraph [ref=e1150]:
              - strong [ref=e1151]: CLIP的鲁棒性是来自预训练还是来自架构？
              - text: Wu et al.（2023）认为是预训练先验，但部分学者认为是对比学习架构本身（对称性、温度系数）导致的。目前缺乏严格的因果分析来区分这两种因素。
          - listitem [ref=e1152]:
            - paragraph [ref=e1153]:
              - strong [ref=e1154]: prompt tuning vs. full fine-tuning在噪声下的权衡
              - text: ：prompt tuning更鲁棒但可能容量不足，full fine-tuning性能上限更高但对噪声更敏感。在实际应用中如何选择取决于噪声比例和可用计算资源。
          - listitem [ref=e1155]:
            - paragraph [ref=e1156]:
              - strong [ref=e1157]: 样本选择的召回率与精确率权衡
              - text: ：CLIPCleaner等样本选择方法倾向于高精确率（选出的样本确实干净），但可能召回率低（遗漏了大量干净样本）。是否值得为了精确率牺牲召回率，取决于后续训练策略。
        - heading "❓ 资料不足" [level=3] [ref=e1158]
        - list [ref=e1159]:
          - listitem [ref=e1160]:
            - paragraph [ref=e1161]:
              - strong [ref=e1162]: CLIP在结构噪声（如标签错位、缺失标签）下的表现
              - text: ：现有研究主要关注随机噪声或对称噪声，对更复杂的噪声类型（如标签错位、部分缺失标签、层级噪声）研究不足。
          - listitem [ref=e1163]:
            - paragraph [ref=e1164]:
              - strong [ref=e1165]: 多模态噪声的联合建模
              - text: ：当图像和文本同时存在噪声时，如何协同处理？现有工作大多假设只有文本标签有噪声，而图像是干净的。
          - listitem [ref=e1166]:
            - paragraph [ref=e1167]:
              - strong [ref=e1168]: CLIP噪声标签学习在医疗、遥感等专业领域的应用
              - text: ：跨域迁移时的去噪策略尚缺乏系统研究。CLIPCleaner等方法在自然图像上表现良好，但在医学影像、卫星图像等专业领域的效果未知。
          - listitem [ref=e1169]:
            - paragraph [ref=e1170]:
              - strong [ref=e1171]: 噪声比例的自适应估计
              - text: ：NLPrompt等方法需要知道噪声比例才能调整超参数，但在实际应用中噪声比例通常是未知的。如何在线估计噪声比例是一个开放问题。
          - listitem [ref=e1172]:
            - paragraph [ref=e1173]:
              - strong [ref=e1174]: 扩散模型在噪声标签校正中的潜力
              - text: ：Chen et al.（2023）的工作展示了扩散模型的潜力，但其计算成本高、依赖外部检索库等限制尚未解决。
        - separator [ref=e1175]
        - heading "五、未来研究方向" [level=2] [ref=e1176]
        - list [ref=e1177]:
          - listitem [ref=e1178]:
            - paragraph [ref=e1179]:
              - strong [ref=e1180]: 统一的多模态噪声处理框架
              - text: ：将样本选择、标签校正、鲁棒训练集成到一个端到端框架中，而不是分步处理。这需要设计一个联合优化的目标函数。
          - listitem [ref=e1181]:
            - paragraph [ref=e1182]:
              - strong [ref=e1183]: 噪声感知的提示学习
              - text: ：结合大语言模型（LLM）生成动态提示，使prompt能够根据噪声水平自适应调整。例如，当检测到高噪声时，prompt可以更加保守地依赖预训练先验。
          - listitem [ref=e1184]:
            - paragraph [ref=e1185]:
              - strong [ref=e1186]: 跨域噪声标签学习
              - text: ：研究CLIP在源域和目标域分布差异下的噪声鲁棒性，尤其是在域偏移+噪声标签的复杂场景。CRoF已经迈出了第一步，但还需要更通用的解决方案。
          - listitem [ref=e1187]:
            - paragraph [ref=e1188]:
              - strong [ref=e1189]: 可解释的噪声检测
              - text: ：利用CLIP的注意力机制和多模态对齐特性，提供样本被判定为噪声的可解释性理由。这对于医疗等高风险领域的应用至关重要。
          - listitem [ref=e1190]:
            - paragraph [ref=e1191]:
              - strong [ref=e1192]: 大规模噪声数据预训练的改进
              - text: ：借鉴MOFI的思路，探索如何从更大规模、更嘈杂的互联网数据中预训练更鲁棒的视觉-语言模型。这可能是从根源上解决噪声标签问题的方法。
          - listitem [ref=e1193]:
            - paragraph [ref=e1194]:
              - strong [ref=e1195]: 与扩散模型结合
              - text: ：如Label-Retrieval-Augmented Diffusion Models（Chen et al., 2023）所示，利用生成模型进行标签校正是一个有前景的方向。未来可以探索更高效、更轻量的生成模型用于噪声校正。
          - listitem [ref=e1196]:
            - paragraph [ref=e1197]:
              - strong [ref=e1198]: 测试时适应（Test-Time Adaptation）中的噪声鲁棒性
              - text: ：Noisy Test-Time Adaptation（Cao et al., 2025）的工作表明，测试时的分布偏移也会引入噪声。将训练时的噪声鲁棒方法与测试时适应结合是一个新兴方向。
          - listitem [ref=e1199]:
            - paragraph [ref=e1200]:
              - strong [ref=e1201]: 噪声标签学习与模型压缩的交叉
              - text: ：在实际部署中，CLIP模型往往需要被压缩（如量化、剪枝）。噪声标签对压缩后模型的影响以及如何在压缩过程中保持噪声鲁棒性尚未被研究。
        - separator [ref=e1202]
        - heading "六、总结" [level=2] [ref=e1203]
        - paragraph [ref=e1204]: CLIP噪声标签学习是一个快速发展的交叉领域，融合了视觉-语言模型、鲁棒学习和少样本学习等多个方向。当前研究已经证明：
        - list [ref=e1205]:
          - listitem [ref=e1206]:
            - text: CLIP的预训练知识可以
            - strong [ref=e1207]: 显著提升
            - text: 噪声标签学习的鲁棒性；
          - listitem [ref=e1208]:
            - strong [ref=e1209]: 样本选择与训练解耦
            - text: 是克服self-confirmation bias的有效途径；
          - listitem [ref=e1210]:
            - strong [ref=e1211]: prompt tuning
            - text: 在噪声场景下具有天然优势，是实际部署的首选方案；
          - listitem [ref=e1212]:
            - strong [ref=e1213]: 梯度约束
            - text: 和
            - strong [ref=e1214]: 视觉引导学习
            - text: 是新兴的有效策略。
        - paragraph [ref=e1215]: 从技术路线来看，该领域经历了三个阶段的发展：
        - list [ref=e1216]:
          - listitem [ref=e1217]:
            - strong [ref=e1218]: 第一阶段（2021-2022）
            - text: ：探索CLIP本身对噪声的鲁棒性，代表工作是Transductive CLIP
          - listitem [ref=e1219]:
            - strong [ref=e1220]: 第二阶段（2023-2024）
            - text: ：系统性地利用CLIP进行样本选择和鲁棒微调，代表工作是CLIPCleaner、Wu et al.的鲁棒prompt tuning分析
          - listitem [ref=e1221]:
            - strong [ref=e1222]: 第三阶段（2025-2026）
            - text: ：提出更精细的机制（如梯度抑制、视觉引导、扩散模型校正），代表工作是IGS、Seeing is Believing
        - paragraph [ref=e1223]: 然而，在跨域迁移、复杂噪声类型、多模态联合去噪等方面仍存在大量开放问题。随着视觉-语言基础模型的持续演进，噪声标签学习有望从"被动防御"转向"主动利用"——即从噪声数据中学习更鲁棒、更通用的表示，而非仅仅清洗噪声。
        - paragraph [ref=e1224]:
          - text: 可以预见，未来几年该领域将朝着
          - strong [ref=e1225]: 更自动化、更跨域、更可解释
          - text: 的方向发展，同时扩散模型和大语言模型的引入将为噪声标签学习带来新的突破。
        - separator [ref=e1226]
        - paragraph [ref=e1227]:
          - emphasis [ref=e1228]: 本综述基于对arXiv上20+篇相关论文的系统调研，涵盖了2021-2026年的主要进展。
