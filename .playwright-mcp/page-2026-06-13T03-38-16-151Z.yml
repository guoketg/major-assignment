        - heading "四、关键争议点与未解问题" [level=2] [ref=e431]
        - heading "✅ 已证实的结论" [level=3] [ref=e432]
        - list [ref=e433]:
          - listitem [ref=e434]:
            - strong [ref=e435]: Prompt tuning 对噪声标签天然鲁棒
            - text: （Wu et al., 2023）：由于只更新少量参数且冻结预训练编码器，prompt tuning 在噪声标签下表现出色。
          - listitem [ref=e436]:
            - strong [ref=e437]: CLIP 作为噪声检测器有效
            - text: （Wei et al., 2024; CLIPCleaner）：CLIP 的图文对齐能力可以可靠地识别噪声样本。
          - listitem [ref=e438]:
            - strong [ref=e439]: 样本选择与训练解耦优于自训练
            - text: （CLIPCleaner）：避免 self-confirmation bias 是提升噪声标签学习效果的关键。
        - heading "⚠️ 争议点" [level=3] [ref=e440]
        - list [ref=e441]:
          - listitem [ref=e442]:
            - strong [ref=e443]: CLIP 的鲁棒性是来自预训练还是来自架构？
            - text: Wu et al.（2023）认为是预训练先验，但部分学者认为是对比学习架构本身（对称性、温度系数）导致的。
          - listitem [ref=e444]:
            - strong [ref=e445]: prompt tuning vs. full fine-tuning 在噪声下的权衡
            - text: ：prompt tuning 更鲁棒但可能容量不足，full fine-tuning 性能上限更高但对噪声更敏感。
        - heading "❓ 资料不足" [level=3] [ref=e446]
        - list [ref=e447]:
          - listitem [ref=e448]:
            - strong [ref=e449]: CLIP 在
            - text: 结构噪声**（如标签错位、缺失标签）下的表现**：现有研究主要关注随机噪声或对称噪声，对更复杂的噪声类型研究不足。
          - listitem [ref=e450]:
            - strong [ref=e451]: 多模态噪声的联合建模
            - text: ：当图像和文本同时存在噪声时，如何协同处理？
          - listitem [ref=e452]:
            - strong [ref=e453]: CLIP 噪声标签学习在医疗、遥感等专业领域的应用
            - text: ：跨域迁移时的去噪策略尚缺乏系统研究。
        - separator [ref=e454]
        - heading "五、未来研究方向" [level=2] [ref=e455]
        - list [ref=e456]:
          - listitem [ref=e457]:
            - paragraph [ref=e458]:
              - strong [ref=e459]: 统一的多模态噪声处理框架
              - text: ：将样本选择、标签校正、鲁棒训练集成到一个端到端框架中，而不是分步处理。
          - listitem [ref=e460]:
            - paragraph [ref=e461]:
              - strong [ref=e462]: 噪声感知的提示学习
              - text: ：结合大语言模型（LLM）生成动态提示，使 prompt 能够根据噪声水平自适应调整。
          - listitem [ref=e463]:
            - paragraph [ref=e464]:
              - strong [ref=e465]: 跨域噪声标签学习
              - text: ：研究 CLIP 在源域和目标域分布差异下的噪声鲁棒性，尤其是在域偏移+噪声标签的复杂场景。
          - listitem [ref=e466]:
            - paragraph [ref=e467]:
              - strong [ref=e468]: 可解释的噪声检测
              - text: ：利用 CLIP 的注意力机制和多模态对齐特性，提供样本被判定为噪声的可解释性理由。
          - listitem [ref=e469]:
            - paragraph [ref=e470]:
              - strong [ref=e471]: 大规模噪声数据预训练的改进
              - text: ：借鉴 MOFI 的思路，探索如何从更大规模、更嘈杂的互联网数据中预训练更鲁棒的视觉-语言模型。
          - listitem [ref=e472]:
            - paragraph [ref=e473]:
              - strong [ref=e474]: 与扩散模型结合
              - text: ：如 Label-Retrieval-Augmented Diffusion Models（Chen et al., 2023）所示，利用生成模型进行标签校正是一个有前景的方向。
        - separator [ref=e475]
        - heading "六、总结" [level=2] [ref=e476]
        - paragraph [ref=e477]: CLIP 噪声标签学习是一个快速发展的交叉领域，融合了视觉-语言模型、鲁棒学习和少样本学习等多个方向。当前研究已经证明：
        - list [ref=e478]:
          - listitem [ref=e479]:
            - text: CLIP 的预训练知识可以
            - strong [ref=e480]: 显著提升
            - text: 噪声标签学习的鲁棒性；
          - listitem [ref=e481]:
            - strong [ref=e482]: 样本选择与训练解耦
            - text: 是克服 self-confirmation bias 的有效途径；
          - listitem [ref=e483]:
            - strong [ref=e484]: prompt tuning
            - text: 在噪声场景下具有天然优势，是实际部署的首选方案。
        - paragraph [ref=e485]: 然而，在跨域迁移、复杂噪声类型、多模态联合去噪等方面仍存在大量开放问题。随着视觉-语言基础模型的持续演进，噪声标签学习有望从“被动防御”转向“主动利用”——即从噪声数据中学习更鲁棒、更通用的表示，而非仅仅清洗噪声。
        - separator [ref=e486]
        - paragraph [ref=e487]:
          - emphasis [ref=e488]: 本综述基于对 arXiv 上 20+ 篇相关论文的系统调研，涵盖了 2021-2026 年的主要进展。
      - generic [ref=e491]:
        - heading "CLIP 噪声标签学习综述：方法、挑战与未来方向" [level=1] [ref=e492]
        - heading "一、领域简介" [level=2] [ref=e493]
        - paragraph [ref=e494]: 随着 CLIP（Contrastive Language-Image Pre-training）等视觉-语言基础模型的兴起，零样本和少样本学习能力取得了突破性进展。然而，现实世界中的数据标注不可避免会引入标签噪声——无论是来自网络爬取的弱监督数据，还是人工标注中的主观错误。噪声标签会严重损害模型在下游任务上的泛化性能。
        - paragraph [ref=e495]:
          - text: CLIP 模型本身在大规模图文对（如 WIT-400M）上预训练时就已经暴露在大量噪声中，但其对比学习目标（InfoNCE loss）天然具有一定的鲁棒性。然而，当在下游任务上进行微调（如 prompt tuning 或 linear probing）时，噪声标签的影响会显著放大。近年来，学术界围绕"
          - strong [ref=e496]: 如何利用 CLIP 的预训练知识来对抗噪声标签
          - text: "\"这一核心问题，形成了多个研究方向。"
        - separator [ref=e497]
        - heading "二、核心方法分类" [level=2] [ref=e498]
        - heading "1. 基于 CLIP 的样本选择与清洗（Sample Selection & Cleaning）" [level=3] [ref=e499]
        - paragraph [ref=e500]:
          - strong [ref=e501]: 代表工作：CLIPCleaner（Feng et al., 2024）
        - list [ref=e502]:
          - listitem [ref=e503]:
            - strong [ref=e504]: 核心思想
            - text: ：利用 CLIP 的零样本分类能力，在
            - strong [ref=e505]: 不依赖训练中模型
            - text: 的情况下进行样本选择。CLIP 通过自动生成的 LLM 描述性提示（如"a photo of a dog, which has four legs and floppy ears"）对样本进行零样本分类，选择高置信度的样本作为干净样本。
          - listitem [ref=e506]:
            - strong [ref=e507]: 创新点
            - text: ：样本选择与训练过程
            - strong [ref=e508]: 完全解耦
            - text: ，避免了传统"小损失"方法中"自我确认偏差"（self-confirmation bias）的问题。同时，CLIP 的语义感知能力可以处理视觉上相似类别之间的"硬噪声"（hard noise）。
          - listitem [ref=e509]:
            - strong [ref=e510]: 优势
            - text: ：一次性完成，计算开销低；对噪声类型不敏感。
          - listitem [ref=e511]:
            - strong [ref=e512]: 局限
            - text: ：严重依赖 CLIP 在目标域上的零样本性能，若目标域与 CLIP 预训练分布差异较大，效果会显著下降。
        - paragraph [ref=e513]:
          - strong [ref=e514]: 代表工作：Vision-Language Models are Strong Noisy Label Detectors（Wei et al., 2024）
        - list [ref=e515]:
          - listitem [ref=e516]:
            - strong [ref=e517]: 核心思想
            - text: ：系统性地验证了视觉-语言模型（尤其是 CLIP）作为噪声标签检测器的能力。通过对比图像-文本对的语义一致性得分，可以可靠地识别出噪声样本。
          - listitem [ref=e518]:
            - strong [ref=e519]: 创新点
            - text: ：将 CLIP 的图文对齐能力直接用作噪声检测指标，无需额外训练。
          - listitem [ref=e520]:
            - strong [ref=e521]: 优势
            - text: ：方法简单高效，可作为预处理步骤。
          - listitem [ref=e522]:
            - strong [ref=e523]: 局限
            - text: ：对于多义性样本（如一张图可以对应多个正确标签）可能产生误判。
        - separator [ref=e524]
        - heading "2. 鲁棒提示学习（Robust Prompt Tuning）" [level=3] [ref=e525]
        - paragraph [ref=e526]:
          - strong [ref=e527]: 代表工作：Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?（Wu et al., 2023）
        - list [ref=e528]:
          - listitem [ref=e529]:
            - strong [ref=e530]: 核心发现
            - text: ：作者通过实验发现，prompt tuning（如 CoOp、CoCoOp）在噪声标签下表现出
            - strong [ref=e531]: 惊人的鲁棒性
            - text: 。进一步分析表明，这是因为 prompt tuning 只更新少量参数（文本端的 prompt tokens），而冻结了视觉编码器和文本编码器。预训练得到的强先验知识（strong prior）使得模型不会轻易被少数噪声样本带偏。
          - listitem [ref=e532]:
            - strong [ref=e533]: 创新点
            - text: ：首次从理论和实验角度解释了 prompt tuning 对噪声标签的鲁棒性来源。
          - listitem [ref=e534]:
            - strong [ref=e535]: 优势
            - text: ：参数高效、天然抗噪、适合少样本场景。
          - listitem [ref=e536]:
            - strong [ref=e537]: 局限
            - text: ：当噪声比例极高（>60%）时，鲁棒性仍然会受到侵蚀。
        - paragraph [ref=e538]:
          - strong [ref=e539]: "代表工作：NLPrompt: Noise-Label Prompt Learning for Vision-Language Models（Pan et al., 2024）"
        - list [ref=e540]:
          - listitem [ref=e541]:
            - strong [ref=e542]: 核心思想
            - text: ：针对 prompt tuning 在噪声标签下性能下降的问题，提出了一种噪声感知的 prompt 学习方法。通过引入噪声鲁棒的损失函数和样本权重调整机制，在 prompt 学习过程中动态降低噪声样本的影响。
          - listitem [ref=e543]:
            - strong [ref=e544]: 创新点
            - text: ：将噪声标签建模与 prompt 优化联合进行。
          - listitem [ref=e545]:
            - strong [ref=e546]: 优势
            - text: ：在中等噪声比例下优于标准 prompt tuning。
          - listitem [ref=e547]:
            - strong [ref=e548]: 局限
            - text: ：需要额外的噪声比例估计，实际应用中较难准确获取。
        - paragraph [ref=e549]:
          - strong [ref=e550]: 代表工作：Intrinsic Gradient Suppression for Label-Noise Prompt Tuning（Li et al., 2026）
        - list [ref=e551]:
          - listitem [ref=e552]:
            - strong [ref=e553]: 核心思想
            - text: ：发现噪声样本会产生
            - strong [ref=e554]: 不成比例的大梯度
            - text: ，从而主导优化方向。作者提出内在梯度抑制（IGS）机制，通过分析梯度范数自动检测并抑制噪声样本的梯度。
          - listitem [ref=e555]:
            - strong [ref=e556]: 创新点
            - text: ：不需要显式的样本选择或噪声比例估计，全自动处理。
          - listitem [ref=e557]:
            - strong [ref=e558]: 优势
            - text: ：端到端训练，适应性强。
          - listitem [ref=e559]:
            - strong [ref=e560]: 局限
            - text: ：梯度分析增加了计算开销。
        - paragraph [ref=e561]:
          - strong [ref=e562]: "代表工作：Seeing is Believing: Robust Vision-Guided Cross-Modal Prompt Learning under Label Noise（Geng et al., 2026）"
        - list [ref=e563]:
          - listitem [ref=e564]:
            - strong [ref=e565]: 核心思想
            - text: ：提出视觉引导的跨模态提示学习。核心假设是：
            - strong [ref=e566]: 视觉内容比文本标签包含更丰富、更可靠的语义信息
            - text: 。因此，在 prompt 学习过程中，利用视觉特征的一致性来纠正噪声标签的影响。
          - listitem [ref=e567]:
            - strong [ref=e568]: 创新点
            - text: ：从视觉模态出发引导文本模态的优化，双向校正。
          - listitem [ref=e569]:
            - strong [ref=e570]: 优势
            - text: ：对高噪声比例场景鲁棒。
          - listitem [ref=e571]:
            - strong [ref=e572]: 局限
            - text: ：依赖高质量视觉特征提取，在低质量图像上可能失效。
        - separator [ref=e573]
        - heading "3. 少样本场景下的噪声鲁棒方法" [level=3] [ref=e574]
        - paragraph [ref=e575]:
          - strong [ref=e576]: "代表工作：CRoF: CLIP-based Robust Few-shot Learning on Noisy Labels（Deng et al., 2024）"
        - list [ref=e577]:
          - listitem [ref=e578]:
            - strong [ref=e579]: 核心思想
            - text: ：在少样本学习（FSL）场景下，噪声标签的危害更大，因为样本数量少，噪声样本难以被稀释。CRoF 结合 CLIP 的图像-文本嵌入相似度，设计了一种域自适应和噪声鲁棒的训练框架。
          - listitem [ref=e580]:
            - strong [ref=e581]: 创新点
            - text: ：将域对齐与噪声标签处理统一到少样本框架中。
          - listitem [ref=e582]:
            - strong [ref=e583]: 优势
            - text: ：在跨域的少样本噪声场景下表现优异。
          - listitem [ref=e584]:
            - strong [ref=e585]: 局限
            - text: ：需要额外的未标记目标域数据用于域自适应。
        - separator [ref=e586]
        - heading "4. 噪声标签校正与伪标签生成" [level=3] [ref=e587]
        - paragraph [ref=e588]:
          - strong [ref=e589]: 代表工作：Transductive CLIP with Class-Conditional Contrastive Learning（Huang et al., 2022）
        - list [ref=e590]:
          - listitem [ref=e591]:
            - strong [ref=e592]: 核心思想
            - text: ：利用 CLIP 的监督信号来缓解数据标注负担，但意识到这种监督中不可避免地包含噪声。作者提出直推式（transductive）学习方法，通过类条件对比学习来校正 CLIP 产生的伪标签中的噪声。
          - listitem [ref=e593]:
            - strong [ref=e594]: 创新点
            - text: ：将 CLIP 作为教师模型生成伪标签，同时设计去噪机制。
          - listitem [ref=e595]:
            - strong [ref=e596]: 优势
            - text: ：无需人工标注，完全自动化。
          - listitem [ref=e597]:
            - strong [ref=e598]: 局限
            - text: ：教师模型（CLIP）的偏差会被传递给学生模型。
        - paragraph [ref=e599]:
          - strong [ref=e600]: "代表工作：MOFI: Learning Image Representations from Noisy Entity Annotated Images（Wu et al., 2023）"
        - list [ref=e601]:
          - listitem [ref=e602]:
            - strong [ref=e603]: 核心思想
            - text: ：从噪声实体标注的图像中学习视觉表示。MOFI 提出了自动化的噪声标注数据构建方法，以及针对性的训练策略（如渐进式样本选择、多实例学习）。
          - listitem [ref=e604]:
            - strong [ref=e605]: 创新点
            - text: ：大规模噪声数据预训练的新范式。
          - listitem [ref=e606]:
            - strong [ref=e607]: 优势
            - text: ：能够从互联网级噪声数据中学习有效表示。
          - listitem [ref=e608]:
            - strong [ref=e609]: 局限
            - text: ：训练成本高，需要大规模计算资源。
        - separator [ref=e610]
