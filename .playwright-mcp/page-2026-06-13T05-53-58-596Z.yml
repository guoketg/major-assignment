      - generic [ref=e107]:
        - paragraph [ref=e108]: 我来为您搜索深度学习在Transformer、Mamba和扩散模型方面的最新进展。# 深度学习最新进展调研报告：Transformer、Mamba 与扩散模型
        - heading "一、领域简介" [level=2] [ref=e125]
        - paragraph [ref=e126]:
          - text: 2024-2025年是深度学习架构发生深刻变革的时期。以Transformer为基础的模型长期主导自然语言处理和多模态领域，但其二次方复杂度的自注意力机制在处理长序列时面临计算瓶颈。与此同时，
          - strong [ref=e127]: 状态空间模型（SSM）
          - text: 的代表性架构Mamba凭借线性复杂度迅速崛起，在长序列建模中展现出与Transformer比肩甚至超越的性能。此外，
          - strong [ref=e128]: 扩散模型
          - text: 从图像生成领域扩展到视频、音频、3D和多模态生成，成为生成式AI的核心引擎。这三条技术路线正在走向融合与互补。
        - separator [ref=e129]
        - heading "二、核心方法分类与最新进展" [level=2] [ref=e130]
        - heading "1. Transformer：从独占到融合" [level=3] [ref=e131]
        - paragraph [ref=e132]: Transformer仍是当前AI系统的基础架构，但其局限性日益显现：
        - list [ref=e133]:
          - listitem [ref=e134]:
            - strong [ref=e135]: 计算效率瓶颈
            - text: ：自注意力机制的二次复杂度（O(n²)）在处理超长序列时成本高昂
          - listitem [ref=e136]:
            - strong [ref=e137]: 最新趋势——混合架构
            - text: ：Falcon-H1（2025年7月）提出了
            - strong [ref=e138]: 混合头（Hybrid-Head）语言模型
            - text: ，将Transformer与Mamba架构结合，在保持高性能的同时大幅提升推理效率。这标志着业界从"纯Transformer"转向"按需组合"的设计哲学
        - paragraph [ref=e139]:
          - strong [ref=e140]: 关键论文
          - text: ：Falcon-H1（arXiv:2507.22448）——"Unlike earlier Falcon models built solely on Transformer or Mamba architectures, Falcon-H1 adopts a hybrid architecture"
        - heading "2. Mamba：状态空间模型的崛起" [level=3] [ref=e141]
        - paragraph [ref=e142]: Mamba（选择性结构化状态空间模型）是2024年最具影响力的架构创新之一：
        - list [ref=e143]:
          - listitem [ref=e144]:
            - strong [ref=e145]: 核心优势
            - text: ：线性复杂度（O(n)）的长序列建模能力，理论上可处理无限长上下文
          - listitem [ref=e146]:
            - strong [ref=e147]: 多模态扩展
            - text: ：
            - list [ref=e148]:
              - listitem [ref=e149]:
                - strong [ref=e150]: Mixture-of-Mamba
                - text: （arXiv:2501.16295）——引入模态感知稀疏机制，将Mamba扩展到多模态预训练，解决了SSM无法利用模态特定特征的局限
              - listitem [ref=e151]:
                - strong [ref=e152]: Visual Mamba综述
                - text: （arXiv:2404.18861）——系统总结了Mamba在计算机视觉中的应用，包括图像分类、目标检测、视频理解等
              - listitem [ref=e153]:
                - strong [ref=e154]: SELD-Mamba
                - text: （arXiv:2408.05057）——将Mamba应用于声音事件定位与检测，在音频领域击败Transformer
          - listitem [ref=e155]:
            - strong [ref=e156]: 微调技术
            - text: ：PEFT for SSM（arXiv:2410.09016）——探索了参数高效微调方法在Mamba上的应用，填补了该领域空白
        - paragraph [ref=e157]:
          - strong [ref=e158]: 关键论文
          - text: ：
        - list [ref=e159]:
          - listitem [ref=e160]: Mixture-of-Mamba（arXiv:2501.16295）："proposes a novel SSM architecture that introduces modality-aware sparsity"
          - listitem [ref=e161]: Visual Mamba（arXiv:2404.18861）："excels in long sequence modeling, which is vital in the large model era"
        - heading "3. 扩散模型：从图像到多模态生成" [level=3] [ref=e162]
        - paragraph [ref=e163]: 扩散模型已从Stable Diffusion的图像生成，扩展到更广泛的领域：
        - list [ref=e164]:
          - listitem [ref=e165]:
            - strong [ref=e166]: 视频生成
            - text: ：基于扩散模型的文生视频技术（如Sora的开源复现）成为2024年最大热点之一
          - listitem [ref=e167]:
            - strong [ref=e168]: 模型坍缩问题
            - text: ：最新研究（arXiv:2511.05535）指出，扩散模型（如Stable Diffusion）生成的高质量图像和视频数据如果被反复用于训练，会导致
            - strong [ref=e169]: 模型坍缩
            - text: ——生成数据分布逐渐偏离真实分布，这是一个亟待解决的关键挑战
          - listitem [ref=e170]:
            - strong [ref=e171]: 多模态对齐
            - text: ：V-SONAR（arXiv:2603.01096）提出
            - strong [ref=e172]: 概念空间对齐
            - text: 方法，将视觉嵌入空间与文本嵌入空间对齐，支持1500种文本语言和177种语音语言，展示了扩散模型与多模态系统的深度融合
        - paragraph [ref=e173]:
          - strong [ref=e174]: 关键论文
          - text: ：
        - list [ref=e175]:
          - listitem [ref=e176]: Model Collapse（arXiv:2511.05535）："Diffusion models like Stable Diffusion generate high-quality images and videos from text"
          - listitem [ref=e177]: V-SONAR（arXiv:2603.01096）："a vision-language embedding space extended from the text-only embedding space"
        - separator [ref=e178]
        - heading "三、各方法优缺点对比" [level=2] [ref=e179]
