      - generic [ref=e188]: 100字介绍Python
      - paragraph [ref=e192]:
        - text: Python 是一种
        - strong [ref=e193]: 高级、解释型、通用编程语言
        - text: ，由 Guido van Rossum 于 1991 年创建。它以
        - strong [ref=e194]: 简洁优雅的语法
        - text: 著称，强调代码可读性（使用缩进划分代码块）。Python 支持多种编程范式（面向对象、函数式等），拥有丰富的
        - strong [ref=e195]: 标准库
        - text: 和庞大的第三方生态（如 NumPy、PyTorch、Django），广泛应用于
        - strong [ref=e196]: Web 开发、数据分析、人工智能、自动化脚本
        - text: 等领域，是入门友好且功能强大的语言。
      - generic [ref=e217]: 继续详细介绍Python的面向对象特性
      - generic [ref=e282]:
        - paragraph [ref=e283]:
          - text: 好的！下面详细介绍一下 Python 的
          - strong [ref=e284]: 面向对象编程（OOP）
          - text: 特性。
        - separator [ref=e285]
        - heading "1. 类与对象" [level=2] [ref=e286]
        - paragraph [ref=e287]:
          - text: Python 使用
          - code [ref=e288]: class
          - text: 关键字定义类，支持创建多个实例对象：
        - code [ref=e290]: "class Dog: # 类属性（所有实例共享） species = \"Canis familiaris\" # 构造方法（实例初始化） def __init__(self, name, age): self.name = name # 实例属性 self.age = age # 实例方法 def bark(self): return f\"{self.name} says woof!\" # 创建对象 my_dog = Dog(\"Buddy\", 3) print(my_dog.bark()) # Buddy says woof!"
        - separator [ref=e291]
        - heading "2. 封装（Encapsulation）" [level=2] [ref=e292]
        - paragraph [ref=e293]:
          - text: Python 通过
          - strong [ref=e294]: 命名约定
          - text: 实现访问控制，没有真正的
          - code [ref=e295]: private
          - text: 关键字：
        - table [ref=e296]:
          - rowgroup [ref=e297]:
            - row "命名方式 含义 示例" [ref=e298]:
              - columnheader "命名方式" [ref=e299]
              - columnheader "含义" [ref=e300]
              - columnheader "示例" [ref=e301]
          - rowgroup [ref=e302]:
            - row "name 公开属性 self.name" [ref=e303]:
              - cell "name" [ref=e304]:
                - code [ref=e305]: name
              - cell "公开属性" [ref=e306]
              - cell "self.name" [ref=e307]:
                - code [ref=e308]: self.name
            - row "_name 受保护的（约定，仍可访问） self._age" [ref=e309]:
              - cell "_name" [ref=e310]:
                - code [ref=e311]: _name
              - cell "受保护的（约定，仍可访问）" [ref=e312]
              - cell "self._age" [ref=e313]:
                - code [ref=e314]: self._age
            - row "__name 名称改写（Name Mangling） self.__salary" [ref=e315]:
              - cell "__name" [ref=e316]:
                - code [ref=e317]: __name
              - cell "名称改写（Name Mangling）" [ref=e318]
              - cell "self.__salary" [ref=e319]:
                - code [ref=e320]: self.__salary
        - code [ref=e322]: "class BankAccount: def __init__(self, owner, balance): self.owner = owner # 公开 self._balance = balance # 受保护（约定） self.__pin = \"1234\" # 私有（名称改写为 _BankAccount__pin） def get_balance(self): # 公开的 getter 方法 return self._balance"
        - blockquote [ref=e323]:
          - paragraph [ref=e324]:
            - text: 注意：
            - code [ref=e325]: __pin
            - text: 实际上被改名为
            - code [ref=e326]: _BankAccount__pin
            - text: ，仍可通过
            - code [ref=e327]: obj._BankAccount__pin
            - text: 访问，但强烈不建议。
        - separator [ref=e328]
        - heading "3. 继承（Inheritance）" [level=2] [ref=e329]
        - paragraph [ref=e330]:
          - text: Python 支持
          - strong [ref=e331]: 单继承
          - text: 和
          - strong [ref=e332]: 多继承
          - text: ：
        - code [ref=e334]: "# 父类 class Animal: def __init__(self, name): self.name = name def speak(self): return \"...\" # 子类继承 class Cat(Animal): def speak(self): # 方法重写（Override） return f\"{self.name} says meow!\" class Dog(Animal): def speak(self): return f\"{self.name} says woof!\" # 多继承 class FlyingDog(Dog, Bird): # 同时继承两个类 pass"
        - paragraph [ref=e335]:
          - strong [ref=e336]: 方法解析顺序（MRO）
          - text: ：Python 使用 C3 线性化算法，可通过
          - code [ref=e337]: ClassName.__mro__
          - text: 查看。
        - separator [ref=e338]
        - heading "4. 多态（Polymorphism）" [level=2] [ref=e339]
        - paragraph [ref=e340]:
          - text: Python 是
          - strong [ref=e341]: 动态类型
          - text: 语言，多态天然支持——只要对象有对应方法即可：
        - code [ref=e343]: "def make_sound(animal): print(animal.speak()) # 不关心具体类型，只关心是否有 speak() 方法 make_sound(Cat(\"Kitty\")) # Kitty says meow! make_sound(Dog(\"Rex\")) # Rex says woof! make_sound(Animal(\"?\")) # ..."
        - paragraph [ref=e344]:
          - text: 这被称为
          - strong [ref=e345]: 鸭子类型
          - text: （Duck Typing）——"如果它走路像鸭子、叫起来像鸭子，那它就是鸭子"。
        - separator [ref=e346]
        - heading "5. 特殊方法（Magic Methods / Dunder Methods）" [level=2] [ref=e347]
        - paragraph [ref=e348]: Python 通过双下划线方法实现运算符重载和内置行为定制：
        - code [ref=e350]: "class Vector: def __init__(self, x, y): self.x = x self.y = y def __add__(self, other): # 支持 + return Vector(self.x + other.x, self.y + other.y) def __repr__(self): # 调试用字符串表示 return f\"Vector({self.x}, {self.y})\" def __len__(self): # 支持 len() return int((self.x**2 + self.y**2)**0.5) v1 = Vector(3, 4) v2 = Vector(1, 2) print(v1 + v2) # Vector(4, 6) print(len(v1)) # 5"
        - paragraph [ref=e351]: 常见特殊方法：
        - list [ref=e352]:
          - listitem [ref=e353]:
            - code [ref=e354]: __init__
            - text: ：构造函数
          - listitem [ref=e355]:
            - code [ref=e356]: __str__
            - text: ：
            - code [ref=e357]: str()
            - text: 和
            - code [ref=e358]: print()
            - text: 调用
          - listitem [ref=e359]:
            - code [ref=e360]: __repr__
            - text: ：调试表示
          - listitem [ref=e361]:
            - code [ref=e362]: __len__
            - text: ：
            - code [ref=e363]: len()
            - text: 调用
          - listitem [ref=e364]:
            - code [ref=e365]: __getitem__
            - text: ：索引访问
            - code [ref=e366]: obj[key]
          - listitem [ref=e367]:
            - code [ref=e368]: __call__
            - text: ：让对象可调用
            - code [ref=e369]: obj()
        - separator [ref=e370]
        - heading "6. 类方法与静态方法" [level=2] [ref=e371]
        - code [ref=e373]: "class MyClass: class_var = 0 @classmethod def class_method(cls): # 第一个参数是类本身 cls.class_var += 1 return f\"Class var: {cls.class_var}\" @staticmethod def static_method(x, y): # 不需要 self 或 cls return x + y # 就像普通函数"
        - list [ref=e374]:
          - listitem [ref=e375]:
            - strong [ref=e376]: 类方法
            - text: ：可访问/修改类属性，常用于工厂模式
          - listitem [ref=e377]:
            - strong [ref=e378]: 静态方法
            - text: ：逻辑上属于类，但不依赖类或实例状态
        - separator [ref=e379]
        - heading "7. 属性装饰器（Property）" [level=2] [ref=e380]
        - paragraph [ref=e381]:
          - text: 用
          - code [ref=e382]: "@property"
          - text: 实现优雅的 getter/setter：
        - code [ref=e384]: "class Temperature: def __init__(self, celsius): self._celsius = celsius @property def celsius(self): # getter return self._celsius @celsius.setter def celsius(self, value): # setter（带验证） if value < -273.15: raise ValueError(\"温度不能低于绝对零度\") self._celsius = value @property def fahrenheit(self): # 只读计算属性 return self._celsius * 9/5 + 32 t = Temperature(25) print(t.fahrenheit) # 77.0 t.celsius = 30 # 使用 setter"
        - separator [ref=e385]
        - heading "8. 抽象类（Abstract Base Classes）" [level=2] [ref=e386]
        - paragraph [ref=e387]:
          - text: 使用
          - code [ref=e388]: abc
          - text: 模块定义接口：
        - code [ref=e390]: "from abc import ABC, abstractmethod class Shape(ABC): @abstractmethod def area(self): # 子类必须实现 pass @abstractmethod def perimeter(self): # 子类必须实现 pass class Circle(Shape): def __init__(self, r): self.r = r def area(self): return 3.14 * self.r ** 2 def perimeter(self): return 2 * 3.14 * self.r # shape = Shape() # TypeError! 不能实例化抽象类"
        - separator [ref=e391]
