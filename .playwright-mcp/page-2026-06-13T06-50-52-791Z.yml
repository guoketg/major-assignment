      - generic [ref=e324]:
        - heading "深度学习简介" [level=1] [ref=e325]
        - paragraph [ref=e326]:
          - text: 深度学习是
          - strong [ref=e327]: 机器学习
          - text: 的一个子领域，其核心思想是使用
          - strong [ref=e328]: 多层神经网络
          - text: 来学习数据的层次化表示。它的名字中的"深度"指的就是神经网络中隐藏层的数量之多。
        - heading "基本原理" [level=2] [ref=e329]
        - paragraph [ref=e330]:
          - text: 深度学习模型通过
          - strong [ref=e331]: 端到端学习
          - text: 的方式，自动从原始数据中提取特征。以图像识别为例：
        - list [ref=e332]:
          - listitem [ref=e333]: 浅层网络学习边缘、纹理等低级特征
          - listitem [ref=e334]: 中层网络学习形状、部件等中级特征
          - listitem [ref=e335]: 深层网络学习物体、场景等高级语义特征
        - paragraph [ref=e336]: 这种层次化的特征学习方式，极大地减少了对人工特征工程的依赖。
        - heading "关键技术" [level=2] [ref=e337]
        - table [ref=e338]:
          - rowgroup [ref=e339]:
            - row "技术 作用" [ref=e340]:
              - columnheader "技术" [ref=e341]
              - columnheader "作用" [ref=e342]
          - rowgroup [ref=e343]:
            - row "反向传播 通过链式法则计算梯度，更新网络参数" [ref=e344]:
              - cell "反向传播" [ref=e345]:
                - strong [ref=e346]: 反向传播
              - cell "通过链式法则计算梯度，更新网络参数" [ref=e347]
            - row "激活函数（ReLU、Sigmoid等） 引入非线性，增强模型表达能力" [ref=e348]:
              - cell "激活函数（ReLU、Sigmoid等）" [ref=e349]:
                - strong [ref=e350]: 激活函数
                - text: （ReLU、Sigmoid等）
              - cell "引入非线性，增强模型表达能力" [ref=e351]
            - row "卷积神经网络（CNN） 擅长处理图像等网格结构数据" [ref=e352]:
              - cell "卷积神经网络（CNN）" [ref=e353]:
                - strong [ref=e354]: 卷积神经网络（CNN）
              - cell "擅长处理图像等网格结构数据" [ref=e355]
            - row "循环神经网络（RNN）/Transformer 擅长处理序列数据（文本、语音）" [ref=e356]:
              - cell "循环神经网络（RNN）/Transformer" [ref=e357]:
                - strong [ref=e358]: 循环神经网络（RNN）/Transformer
              - cell "擅长处理序列数据（文本、语音）" [ref=e359]
            - row "注意力机制 让模型关注输入中最重要的部分" [ref=e360]:
              - cell "注意力机制" [ref=e361]:
                - strong [ref=e362]: 注意力机制
              - cell "让模型关注输入中最重要的部分" [ref=e363]
        - heading "主要应用" [level=2] [ref=e364]
        - list [ref=e365]:
          - listitem [ref=e366]:
            - strong [ref=e367]: 计算机视觉
            - text: ：图像分类、目标检测、图像生成（如 Stable Diffusion）
          - listitem [ref=e368]:
            - strong [ref=e369]: 自然语言处理
            - text: ：机器翻译、情感分析、大语言模型（如 GPT、BERT）
          - listitem [ref=e370]:
            - strong [ref=e371]: 语音识别
            - text: ：语音转文字、语音合成
          - listitem [ref=e372]:
            - strong [ref=e373]: 强化学习
            - text: ：AlphaGo、自动驾驶决策
          - listitem [ref=e374]:
            - strong [ref=e375]: 科学计算
            - text: ：蛋白质结构预测（AlphaFold）、药物发现
        - heading "发展历程" [level=2] [ref=e376]
        - paragraph [ref=e377]: 深度学习经历了三次浪潮：1940-1960年代的神经网络雏形、1980-1990年代的联结主义（反向传播的提出）、以及2006年至今的深度学习复兴（得益于大数据、GPU算力和算法的突破）。
        - paragraph [ref=e378]: 如今，深度学习已渗透到人工智能的各个领域，是推动AI进步的核心引擎。
