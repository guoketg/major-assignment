      - generic [ref=e664]:
        - heading "人工智能发展历史：从图灵到ChatGPT的七十年征程" [level=1] [ref=e665]
        - paragraph [ref=e666]:
          - text: 人工智能（AI）的发展史是一部充满
          - strong [ref=e667]: 高潮与低谷
          - text: 、
          - strong [ref=e668]: 雄心与质疑
          - text: 交织的壮阔史诗。以下按
          - strong [ref=e669]: 五大阶段
          - text: 梳理其关键里程碑。
        - separator [ref=e670]
        - heading "一、萌芽与诞生期（1940s–1956）" [level=2] [ref=e671]
        - heading "核心思想奠基" [level=3] [ref=e672]
        - list [ref=e673]:
          - listitem [ref=e674]:
            - strong [ref=e675]: 1943年
            - text: ：神经科学家McCulloch和数学家Pitts发表《神经活动中内在思想的逻辑演算》，提出
            - strong [ref=e676]: 人工神经元
            - text: 的数学模型（M-P模型），首次用逻辑运算描述大脑神经元的工作方式。
          - listitem [ref=e677]:
            - strong [ref=e678]: 1950年
            - text: ：
            - strong [ref=e679]: 艾伦·图灵
            - text: 发表划时代论文《计算机器与智能》，提出著名的
            - strong [ref=e680]: 图灵测试
            - text: ——如果一台机器能在对话中让人类无法分辨其身份，即可认为具有智能。这篇文章奠定了AI的哲学基础。
          - listitem [ref=e681]:
            - strong [ref=e682]: 1951年
            - text: ：Marvin Minsky和Dean Edmonds建造了
            - strong [ref=e683]: SNARC
            - text: （随机神经模拟强化计算器），这是世界上第一台神经网络模拟器，能模拟40个神经元之间的连接。
        - heading "里程碑事件：达特茅斯会议（1956）" [level=3] [ref=e684]
        - list [ref=e685]:
          - listitem [ref=e686]:
            - text: 约翰·麦卡锡、马文·明斯基、克劳德·香农、纳撒尼尔·罗切斯特等科学家在
            - strong [ref=e687]: 达特茅斯学院
            - text: 召开暑期研讨会。
          - listitem [ref=e688]:
            - strong [ref=e689]: "\"人工智能\"（Artificial Intelligence）这个术语正式诞生"
            - text: ，被定义为"让机器做出需要人类智能的行为的科学与工程"。
          - listitem [ref=e690]: 会议标志着AI从哲学构想正式成为一门独立的学科。
        - separator [ref=e691]
        - heading "二、黄金期与第一次寒冬（1956–1980s）" [level=2] [ref=e692]
        - heading "黄金十年（1956–1974）" [level=3] [ref=e693]
        - list [ref=e694]:
          - listitem [ref=e695]:
            - strong [ref=e696]: 1958年
            - text: ：Frank Rosenblatt发明
            - strong [ref=e697]: 感知机（Perceptron）
            - text: ，这是第一个能够学习的神经网络，在视觉模式识别任务上引起轰动。《纽约时报》报道称"海军将拥有会思考的电子大脑"。
          - listitem [ref=e698]:
            - strong [ref=e699]: 1966年
            - text: ：MIT的Joseph Weizenbaum开发
            - strong [ref=e700]: ELIZA
            - text: 聊天机器人，模拟心理治疗师对话。虽然只是简单的模式匹配，但许多用户当真以为机器有情感，引发了对AI伦理的早期讨论。
          - listitem [ref=e701]:
            - strong [ref=e702]: 1969年
            - text: ：
            - strong [ref=e703]: Shakey机器人
            - text: 诞生——第一个能够推理自身行为的移动机器人，集成了视觉、导航和规划模块。
        - heading "第一次AI寒冬（1974–1980）" [level=3] [ref=e704]
        - list [ref=e705]:
          - listitem [ref=e706]:
            - strong [ref=e707]: 1973年
            - text: ：英国数学物理学家James Lighthill发布《Lighthill报告》，严厉批评AI研究未能兑现承诺，导致英国政府大幅削减AI研究经费。
          - listitem [ref=e708]:
            - strong [ref=e709]: 1969年
            - text: ：Minsky和Papert出版《感知机》一书，数学上证明了单层感知机无法解决
            - strong [ref=e710]: 异或（XOR）问题
            - text: ，直接导致神经网络研究陷入长达近20年的低谷。
          - listitem [ref=e711]: 这一时期被称为**"AI寒冬"**，资金枯竭、研究停滞。
        - heading "专家系统崛起（1980s）" [level=3] [ref=e712]
        - list [ref=e713]:
          - listitem [ref=e714]:
            - strong [ref=e715]: 1980年
            - text: ：
            - strong [ref=e716]: XCON/R1专家系统
            - text: 在DEC公司部署，每年为企业节省4000万美元，证明了AI的商业价值。
          - listitem [ref=e717]:
            - strong [ref=e718]: 1986年
            - text: ：Geoffrey Hinton、David Rumelhart和Ronald Williams等人重新提出
            - strong [ref=e719]: 反向传播算法（Backpropagation）
            - text: ，解决了多层神经网络的训练问题，为后来的深度学习革命埋下伏笔。
        - separator [ref=e720]
        - heading "三、连接主义复兴与机器学习时代（1990s–2010）" [level=2] [ref=e721]
        - heading "关键突破" [level=3] [ref=e722]
        - list [ref=e723]:
          - listitem [ref=e724]:
            - strong [ref=e725]: 1997年
            - text: ：IBM的
            - strong [ref=e726]:
              - text: 深蓝（Deep Blue）
              - strong [ref=e727]: 在国际象棋中击败世界冠军
              - text: 卡斯帕罗夫
            - text: ，这是AI首次在复杂棋类游戏中战胜人类顶尖选手。
          - listitem [ref=e728]:
            - strong [ref=e729]: 2006年
            - text: ：Geoffrey Hinton发表关于**深度信念网络（DBN）**的论文，提出"逐层预训练"策略，解决了深层网络训练困难的问题，
            - strong [ref=e730]: 标志着深度学习时代的正式开端
            - text: 。
          - listitem [ref=e731]:
            - strong [ref=e732]: 2009年
            - text: ：
            - strong [ref=e733]: ImageNet数据集
            - text: 发布，包含超过1400万张标注图像，为计算机视觉研究提供了前所未有的数据基础。
        - heading "数据与算力的爆发" [level=3] [ref=e734]
        - list [ref=e735]:
          - listitem [ref=e736]: 互联网的普及带来了海量数据
          - listitem [ref=e737]: GPU（图形处理器）被引入深度学习训练，计算效率大幅提升
          - listitem [ref=e738]: 开源框架（如Theano、Torch）降低了研究门槛
        - separator [ref=e739]
        - heading "四、深度学习革命期（2012–2020）" [level=2] [ref=e740]
        - heading "标志性事件：AlexNet（2012）" [level=3] [ref=e741]
        - list [ref=e742]:
          - listitem [ref=e743]:
            - text: Alex Krizhevsky、Ilya Sutskever和Geoffrey Hinton的
            - strong [ref=e744]: AlexNet
            - text: 在ImageNet图像识别比赛中以
            - strong [ref=e745]: 巨大优势（错误率15.3% vs 第二名26.2%）
            - text: 夺冠。
          - listitem [ref=e746]: 这是深度卷积神经网络在大型视觉任务上的首次重大胜利，开启了计算机视觉的深度学习时代。
          - listitem [ref=e747]: 直接原因：GPU算力 + 大数据 + ReLU激活函数 + Dropout正则化。
