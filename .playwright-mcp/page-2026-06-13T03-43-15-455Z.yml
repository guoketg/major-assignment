        - separator [ref=e406]
        - heading "CLIP 模型噪声标签问题研究综述" [level=2] [ref=e407]
        - heading "1. 引言" [level=3] [ref=e408]
        - paragraph [ref=e409]:
          - text: CLIP（Contrastive Language-Image Pre-Training）作为大规模视觉-语言基础模型，通过在海量（图像，文本）对上执行对比学习，习得了一个通用的图像-文本联合嵌入空间，展现出强大的零样本泛化与迁移能力。然而，CLIP 在实际应用中面临一个核心挑战——
          - strong [ref=e410]: 噪声标签（Noisy Labels）
          - text: 。这一问题在两个层面尤为突出：
        - list [ref=e411]:
          - listitem [ref=e412]:
            - strong [ref=e413]: 预训练阶段
            - text: ：CLIP 训练依赖从互联网爬取的图文对数据（如 WIT、LAION-400M 等），这些数据天然包含大量噪声。文本描述可能与图像内容不相关、不完整或包含误导性信息。Carlini & Terzis (2021) 在
            - emphasis [ref=e414]: “Poisoning and Backdooring Contrastive Learning”
            - text: 中指出，这种未经严格清洗的训练方式使得 CLIP 对后门攻击和投毒攻击特别脆弱，仅污染 0.01% 的训练数据即可显著影响模型行为。
          - listitem [ref=e415]:
            - strong [ref=e416]: 下游微调阶段
            - text: ：当 CLIP 被适配到特定下游任务时，高质量人工标注成本高昂，常依赖自动标注、弱监督或伪标签方法，这进一步引入了标签噪声。Wang et al. (2024) 在
            - emphasis [ref=e417]: “Pre-Trained Vision-Language Models as Partial Annotators”
            - text: 中系统研究了将 CLIP 作为部分标注器的可行性，发现直接使用其预测作为标签会产生不可忽视的噪声。
        - paragraph [ref=e418]: 因此，研究 CLIP 对噪声标签的鲁棒性机制，并开发有效的噪声应对方法，对于推动 CLIP 从实验室走向实际应用具有至关重要的理论价值和实践意义。
        - heading "2. 核心发现：提示学习对噪声标签的内禀鲁棒性" [level=3] [ref=e419]
        - paragraph [ref=e420]:
          - strong [ref=e421]: Wu et al. (2023)
          - text: 在论文
          - emphasis [ref=e422]: “Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?”
          - text: （arXiv:2307.11978）中做出了一个开创性发现：
          - strong [ref=e423]: CLIP 的提示学习（Prompt Tuning）对标签噪声具有高度内禀鲁棒性
          - text: 。该论文通过系统实验揭示：
        - list [ref=e424]:
          - listitem [ref=e425]:
            - strong [ref=e426]: 惊人表现
            - text: ：在 CIFAR-10/100、ImageNet 等基准数据集上，当标签噪声率高达 40%–80% 时，CoOp（Context Optimization）等提示学习方法仍能保持接近无噪声情况下的分类性能。
          - listitem [ref=e427]:
            - strong [ref=e428]: 对比实验
            - text: ：全微调（Full Fine-tuning）方法在相同噪声率下性能急剧下降，而提示学习几乎不受影响。例如在 60% 对称噪声下，全微调准确率从 85% 跌至 40%，而提示学习仅从 85% 跌至 78%。
        - paragraph [ref=e429]:
          - strong [ref=e430]: 鲁棒性来源的理论分析
          - text: ：
        - list [ref=e431]:
          - listitem [ref=e432]:
            - strong [ref=e433]: 预训练先验的保持
            - text: ：提示学习仅调整少量文本侧的连续 prompt embeddings（通常为 16 个 token，约 1.2 万参数），几乎不改变 CLIP 预训练的视觉-语言对齐空间。因此，预训练阶段从海量数据中学到的丰富知识得以完整保留，不会被噪声样本的误导信号覆盖。
