      - generic [ref=e1221]:
        - heading "CLIP模型噪声标签问题综述" [level=1] [ref=e1222]
        - heading "一、领域简介" [level=2] [ref=e1223]
        - paragraph [ref=e1224]: CLIP（Contrastive Language-Image Pre-training）作为多模态视觉语言基础模型，通过在4亿图文对上训练对比学习目标，展现了强大的零样本泛化能力。然而，CLIP面临的噪声标签问题体现在两个层面：
        - list [ref=e1225]:
          - listitem [ref=e1226]:
            - strong [ref=e1227]: 训练阶段的噪声对应（Noisy Correspondence）
            - text: ：CLIP依赖从互联网爬取的图文数据，这些数据天然包含大量不对齐的图文对（如LAION-5B等数据集），导致模型学到错误的跨模态对应关系。
          - listitem [ref=e1228]:
            - strong [ref=e1229]: 下游适配阶段的标签噪声
            - text: ：将CLIP适配到具体下游任务时，人工标注成本高，常使用弱监督或自动标注，引入类别标签噪声。
        - paragraph [ref=e1230]:
          - text: 近年来，针对CLIP噪声标签的研究形成了三个主要方向：
          - strong [ref=e1231]: 噪声标签鲁棒性分析
          - text: 、
          - strong [ref=e1232]: 基于CLIP的噪声标签清洗
          - text: 、
          - strong [ref=e1233]: 鲁棒的提示学习与微调方法
          - text: 。
        - separator [ref=e1234]
        - heading "二、核心方法分类与论文分析" [level=2] [ref=e1235]
        - heading "分类一：CLIP对噪声标签的鲁棒性分析与理论理解" [level=3] [ref=e1236]
        - table [ref=e1237]:
          - rowgroup [ref=e1238]:
            - row "论文 核心发现" [ref=e1239]:
              - columnheader "论文" [ref=e1240]
              - columnheader "核心发现" [ref=e1241]
          - rowgroup [ref=e1242]:
            - row "Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels? (Wu et al., 2023) ✅ 发现提示学习（Prompt Tuning）对标签噪声高度鲁棒。原因在于CLIP预训练提供的强先验知识限制了模型对错误标签的过拟合，噪声样本的梯度被预训练特征空间抑制。" [ref=e1243]:
              - cell "Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels? (Wu et al., 2023)" [ref=e1244]:
                - strong [ref=e1245]: Why Is Prompt Tuning for Vision-Language Models Robust to Noisy Labels?
                - text: (Wu et al., 2023)
              - cell "✅ 发现提示学习（Prompt Tuning）对标签噪声高度鲁棒。原因在于CLIP预训练提供的强先验知识限制了模型对错误标签的过拟合，噪声样本的梯度被预训练特征空间抑制。" [ref=e1246]
            - row "Intrinsic Gradient Suppression for Label-Noise Prompt Tuning (Li et al., 2026) ✅ 进一步揭示噪声样本会产生不成比例的大梯度，但CLIP的预训练先验可以天然抑制这种干扰。提出显式的梯度抑制策略来增强鲁棒性。" [ref=e1247]:
              - cell "Intrinsic Gradient Suppression for Label-Noise Prompt Tuning (Li et al., 2026)" [ref=e1248]:
                - strong [ref=e1249]: Intrinsic Gradient Suppression for Label-Noise Prompt Tuning
                - text: (Li et al., 2026)
              - cell "✅ 进一步揭示噪声样本会产生不成比例的大梯度，但CLIP的预训练先验可以天然抑制这种干扰。提出显式的梯度抑制策略来增强鲁棒性。" [ref=e1250]
            - row "Transductive CLIP with Class-Conditional Contrastive Learning (Huang et al., 2022) ✅ 指出CLIP在零样本场景下的监督信号本身包含标签噪声，提出类别条件对比学习来缓解。" [ref=e1251]:
              - cell "Transductive CLIP with Class-Conditional Contrastive Learning (Huang et al., 2022)" [ref=e1252]:
