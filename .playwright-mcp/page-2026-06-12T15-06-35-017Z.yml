        - heading "一、领域简介" [level=2] [ref=e1578]
        - paragraph [ref=e1579]:
          - text: CLIP（Contrastive Language-Image Pre-training）通过对比学习在4亿图文对上预训练，实现了强大的零样本迁移能力。然而，CLIP面临的核心挑战之一来自
          - strong [ref=e1580]: 噪声标签
          - text: ，这体现在两个层面：
        - list [ref=e1581]:
          - listitem [ref=e1582]:
            - strong [ref=e1583]: 训练阶段的噪声对应（Noisy Correspondence）
            - text: ：CLIP依赖从互联网爬取的图文数据（如LAION-5B、WIT等），这些数据天然包含大量图文不匹配的噪声样本（如"猫"的图片配"狗"的文字描述），导致模型学到错误的跨模态对应关系。
          - listitem [ref=e1584]:
            - strong [ref=e1585]: 下游适配阶段的标签噪声
            - text: ：将CLIP适配到下游任务时，人工标注成本高昂，常使用自动标注或弱监督方式，引入类别标签噪声。
        - paragraph [ref=e1586]:
          - text: 近年来，随着CLIP在多模态领域的广泛应用，针对其噪声标签问题的研究迅速增长，形成了
          - strong [ref=e1587]: 鲁棒性分析、噪声清洗、鲁棒微调、噪声对应处理
          - text: 四大方向。
