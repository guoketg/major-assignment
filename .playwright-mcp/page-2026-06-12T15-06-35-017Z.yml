              - cell "✅ 指出CLIP在零样本场景下的监督信号本身包含标签噪声，提出类别条件对比学习来缓解。" [ref=e1254]
        - paragraph [ref=e1255]:
          - strong [ref=e1256]: 证据等级
          - text: ：✅ 已证实——多篇论文一致验证CLIP的预训练先验对噪声标签具有天然鲁棒性，且提示学习比全微调更鲁棒。
