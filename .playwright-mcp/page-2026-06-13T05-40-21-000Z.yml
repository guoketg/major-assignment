      - generic [ref=e137]:
        - heading "深度学习简介" [level=1] [ref=e138]
        - paragraph [ref=e139]: 深度学习是机器学习的一个重要分支，它通过构建多层人工神经网络来自动学习数据的层次化特征表示。其核心思想是模拟人脑神经元的工作方式，利用深层网络结构从原始数据中逐层提取越来越抽象的特征。
        - heading "三大核心模型的特点" [level=2] [ref=e140]
        - heading "CNN（卷积神经网络）" [level=3] [ref=e141]
        - paragraph [ref=e142]:
          - text: CNN专为处理
          - strong [ref=e143]: 网格状拓扑数据
          - text: （如图像）而设计，其核心特点是：
        - list [ref=e144]:
          - listitem [ref=e145]:
            - strong [ref=e146]: 局部连接
            - text: ：每个神经元只与输入数据的局部区域相连，大幅减少参数量
          - listitem [ref=e147]:
            - strong [ref=e148]: 权值共享
            - text: ：同一卷积核在图像不同位置使用相同参数，实现平移不变性
          - listitem [ref=e149]:
            - strong [ref=e150]: 池化操作
            - text: ：通过下采样降低特征维度，增强模型对微小变形的鲁棒性
        - paragraph [ref=e151]:
          - text: CNN在
          - strong [ref=e152]: 图像分类、目标检测、图像分割
          - text: 等领域表现卓越，代表模型有AlexNet、ResNet等。
        - heading "RNN（循环神经网络）" [level=3] [ref=e153]
        - paragraph [ref=e154]:
          - text: RNN擅长处理
          - strong [ref=e155]: 序列数据
          - text: （如文本、语音），其核心特点是：
        - list [ref=e156]:
          - listitem [ref=e157]:
            - strong [ref=e158]: 循环结构
            - text: ：通过隐藏状态传递信息，使网络具有记忆能力
          - listitem [ref=e159]:
            - strong [ref=e160]: 时序建模
            - text: ：能捕捉序列中前后元素之间的依赖关系
          - listitem [ref=e161]:
            - strong [ref=e162]: 变长输入
            - text: ：可处理任意长度的序列数据
        - paragraph [ref=e163]:
          - text: 但传统RNN存在
          - strong [ref=e164]: 梯度消失/爆炸
          - text: 问题，难以捕捉长距离依赖。后续的
          - strong [ref=e165]: LSTM
          - text: 和
          - strong [ref=e166]: GRU
          - text: 通过门控机制有效缓解了这一问题。
        - heading "Transformer" [level=3] [ref=e167]
        - paragraph [ref=e168]: Transformer是近年来最具革命性的模型架构，其核心特点是：
        - list [ref=e169]:
          - listitem [ref=e170]:
            - strong [ref=e171]: 自注意力机制
            - text: ：允许模型同时关注输入序列中所有位置，直接建模长距离依赖
          - listitem [ref=e172]:
            - strong [ref=e173]: 并行计算
            - text: ：摆脱了RNN的串行限制，可高效并行处理整个序列
          - listitem [ref=e174]:
            - strong [ref=e175]: 位置编码
            - text: ：通过位置编码引入序列顺序信息，弥补自注意力对位置不敏感的缺陷
        - paragraph [ref=e176]:
          - text: Transformer已成为
          - strong [ref=e177]: 自然语言处理
          - text: （如BERT、GPT系列）和
          - strong [ref=e178]: 计算机视觉
          - text: （如ViT）的主流架构，推动了预训练大模型的发展。
        - heading "小结" [level=2] [ref=e179]
        - paragraph [ref=e180]: 三者各有侧重：CNN擅长局部特征提取，RNN擅长时序建模，而Transformer凭借全局注意力机制和并行计算能力，正在成为深度学习领域的通用基础架构。
